name: Manual XML Fixer

on:
  workflow_dispatch: 

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Run Shield
        run: python3 .github/workflows/xml_shield.py
        
      - name: Push Changes
        run: |
          git config user.name 'Saidjon-Bot'
          git config user.email 'saidjontube@gmail.com'
          git add TMessagesProj/src/main/res/values-tg/strings.xml
          git commit -m '🔧 XML Manual Fix: Factory Reset' || echo 'No changes'
          git push
