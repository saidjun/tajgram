name: Factory Th XML Fix

on:
  push:
    paths:
      - 'TMessagesProj/src/main/res/values-tg/strings.xml'
      - 'TMessagesProj/src/main/res/values-tg/strings.xml'
  workflow_dispatch:

jobs:
  fix-and-verify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      
      - name: Full Factory Repair
        run: |
          # Адреси дақиқ ва пурра
          FILE_PATH="TMessagesProj/src/main/res/values-tg/strings.xml"
          
          # Агар файл дар tgl набошад, варианти tg-ро месанҷад
          if [ ! -f "$FILE_PATH" ]; then
            FILE_PATH="TMessagesProj/src/main/res/values-tg/strings.xml"
          fi
          
          if [ ! -f "$FILE_PATH" ]; then
            echo "❌ Файл дар ягон адрес ёфт нашуд!"
            exit 1
          fi
          
          echo "✅ Файл бомуваффақият ёфт шуд: $FILE_PATH"
          
          # Ислоҳи аломатҳо
          sed -i 's/&/&amp;/g' "$FILE_PATH"
          sed -i 's/</&lt;/g' "$FILE_PATH"
          sed -i 's/>/&gt;/g' "$FILE_PATH"
          sed -i 's/"/&quot;/g' "$FILE_PATH"
          sed -i "s/'/&apos;/g" "$FILE_PATH"

          # Техникаи фоизҳо
          sed -i 's/%/%%/g' "$FILE_PATH"
          sed -i -E 's/%%([0-9]\$[ds])/%\1/g' "$FILE_PATH"

          # Назорат
          OPEN=$(grep -o "<string" "$FILE_PATH" | wc -l)
          CLOSE=$(grep -o "</string>" "$FILE_PATH" | wc -l)

          if [ "$OPEN" -eq "$CLOSE" ] && [ "$OPEN" -gt 0 ]; then
              echo "✅ $OPEN сатр ислоҳ шуд."
          else
              echo "❌ Хатои сохтор: Кушода $OPEN, Пӯшида $CLOSE"
              exit 1
          fi

      - name: Push to GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n $(git status -s) ]]; then
            git add .
            git commit -m "🤖 Robot: Factory Fix applied to $FILE_PATH"
            git push
          fi
