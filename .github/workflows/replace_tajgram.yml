name: 10-Second Pure Package and Import Replacer to Tajgram

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  replace_packages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code fresh
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deep Kutil Conversion of ALL Imports and Package Names
        run: |
          # 1. АЛИШ КАРДАНИ ТАМОМИ ИМПОРТҲО ВА ПАКЕТҲО ДАР КУЛЛИ ФАЙЛҲО (ЯВА, КOТЛИН, ХМЛ)
          find . -type f \( -name "*.java" -o -name "*.kt" -o -name "*.xml" -o -name "*.gradle" \) | while read file; do
            sed -i 's/import org\.telegram\./import org.tajgram./g' "$file" 2>/dev/null || true
            sed -i 's/package org\.telegram\./package org.tajgram./g' "$file" 2>/dev/null || true
            sed -i 's/org\/telegram\/messenger/org\/tajgram\/messenger/g' "$file" 2>/dev/null || true
            sed -i 's/org\.telegram\.messenger/org.tajgram.messenger/g' "$file" 2>/dev/null || true
          done

      - name: Real Live Namespace and Application ID Replacement
        run: |
          # 2. ТАЪМИРИ ФАЙЛҲОИ GRADLE БАРОИ FIREBASE-И НАВ
          find . -name "build.gradle" | while read file; do
            sed -i 's/applicationId "org\.telegram\.messenger"/applicationId "org.tajgram.messenger"/g' "$file" 2>/dev/null || true
            sed -i 's/namespace "org\.telegram\.messenger"/namespace "org.tajgram.messenger"/g' "$file" 2>/dev/null || true
            sed -i "s/namespace 'org\.telegram\.messenger'/namespace 'org.tajgram.messenger'/g" "$file" 2>/dev/null || true
          done

      - name: Real Live App Visual Branding Replacement
        run: |
          # 3. БРЕНДИНГИ КУЛЛИИ НOМҲO, ПРEМИУМ VIP ВА СИТOРAҲOИ TAJGRAM STARS VIP
          find . -name "strings.xml" | while read file; do
            sed -i 's/<string name="AppName">Telegram<\/string>/<string name="AppName">Tajgram<\/string>/g' "$file" 2>/dev/null || true
            sed -i 's/>Telegram</>Tajgram</g' "$file" 2>/dev/null || true
            sed -i 's/Telegram Premium/Tajgram Premium VIP/g' "$file" 2>/dev/null || true
            sed -i 's/Telegram Stars/Tajgram Stars VIP/g' "$file" 2>/dev/null || true
          done

      - name: Push Fixed Code Direct To Current Branch Safely
        run: |
          # 4. СAБТИ РAСМИИ БРEНДИНГ ДAР СAЙТ БO ҲУҚУҚИ ПУРРA
          git config --global user.name "Saidjun Chief Developer"
          git config --global user.email "saidjun@tajgram.messenger"
          
          git add .
          git commit -m "🔥 TAJGRAM CORE RE-CODED: Converted all imports, packages, and titles deeply for Firebase!" || exit 0
          git push origin HEAD:${{ github.ref_name }} --force
