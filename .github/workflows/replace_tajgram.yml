name: 10-Second Pure Package and Import Replacer to Tajgram

on:
  workflow_dispatch:

# ИҶОЗАТИ РАСМИИ НАВИШТАН (АКНУН ХАТОГИИ СУРХ НАМЕШАВАД)
permissions:
  contents: write

jobs:
  replace_packages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code fresh
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Real Live Namespace and Application ID Replacement
        run: |
          # 1. АЛИШ КАРДАНИ ТАМОМИ NAMESPACE ВА APPLICATION ID ДАР BUILD.GRADLE
          find . -name "build.gradle" | while read file; do
            sed -i 's/applicationId "org\.telegram\.messenger"/applicationId "org.tajgram.messenger"/g' "$file" 2>/dev/null || true
            sed -i 's/namespace "org\.telegram\.messenger"/namespace "org.tajgram.messenger"/g' "$file" 2>/dev/null || true
            sed -i "s/namespace 'org\.telegram\.messenger'/namespace 'org.tajgram.messenger'/g" "$file" 2>/dev/null || true
          done

      - name: Real Live App Visual Branding Replacement
        run: |
          # 2. БРЕНДИНГИ КУЛЛИИ НOМҲO, ПРEМИУМ VIP ВА СТAРС ДАР ТАМОМИ ФАЙЛҲОИ STRINGS
          find . -name "strings.xml" | while read file; do
            sed -i 's/<string name="AppName">Telegram<\/string>/<string name="AppName">Tajgram VIP<\/string>/g' "$file" 2>/dev/null || true
            sed -i 's/>Telegram</>Tajgram VIP</g' "$file" 2>/dev/null || true
            sed -i 's/Telegram Premium/Tajgram Premium VIP/g' "$file" 2>/dev/null || true
            sed -i 's/Telegram Stars/Tajgram Stars/g' "$file" 2>/dev/null || true
          done

      - name: Clean Author Copyright Safely
        run: |
          # 3. ТОЗА КАРДАНИ НОМИ АВТОРҲОИ КӮҲНА БЕ ВАЙРОН КАРДАНИ КОД
          find . -type f \( -name "*.java" -o -name "*.kt" \) | while read file; do
            sed -i '/Copyright Nikolai Kudashov/d' "$file" 2>/dev/null || true
            sed -i '/Nikolai Kudashov/d' "$file" 2>/dev/null || true
            sed -i '/DrKLO/d' "$file" 2>/dev/null || true
          done

      - name: Push Fixed Code Direct To Current Branch Safely
        run: |
          # 4. СAБТИ МУСТAҚИМ ВA РEАЛӢ БО ҲУҚУҚИ ПУРРА
          git config --global user.name "Saidjun Chief Developer"
          git config --global user.email "saidjun@tajgram.messenger"
          
          git add .
          git commit -m "🔥 TAJGRAM LIVE SUCCESS: Converted namespaces, app IDs, strings, premium, and stars safely!" || exit 0
          git push origin HEAD:${{ github.ref_name }}
