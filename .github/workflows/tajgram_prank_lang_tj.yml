name: 🎭 Tajgram Prank Language Generator
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  make_prank_lang:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Tajgram Repository
      uses: actions/checkout@v4
      with:
        ref: master
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Advanced XML Parser
      run: |
        pip install lxml

    - name: Generate Massive Tajik Slang and Prank Matrix
      run: |
        cat << 'EOF' > prank_script.py
        import os
        import re
        from lxml import etree

        source_tg = 'TMessagesProj/src/main/res/values-tg/strings.xml'
        target_dir = 'TMessagesProj/src/main/res/values-tg-rQA'
        target_file = os.path.join(target_dir, 'strings.xml')

        if not os.path.exists(target_dir):
            os.makedirs(target_dir)

        # 👑 МАТРИТСАИ ЧУҚУР ВА ЗИЁДИ КАЛИМАҲОИ ПРИКОЛИ САИДҶОН (ТАМОМИ БАРНОМА)
        prank_dictionary = {
            "дар шабака": "ҳози ҳамиҷа бд, пирхар! 🏃‍♂️💨",
            "ба қарибӣ дида шудааст": "инав гум шуд, ҳамин атрофда пир-пир дошт! 🕒",
            "навишта истодааст": "гумш кн, беақл фикр дорад, чизи зӯр навишта истодааст! ✍️🧠",
            "хомӯш кардани огоҳиҳо": "даҳанашро маҳкам кун, вайрон кард умуман! 🤐❌",
            "паёмҳои маҳфузшуда": "хизнаи сирру асрори худам (Касе бинад, чашмош кӯр мешавад!) 📦🔒",
            "нест кардани чат": "гумаш кун, иззу нишонаш намонад, сафҳаро куллӣ маҳв кун! 💣🗑️",
            "паём фиристода шуд": "тир барин парид, рафта ба сараш афтод! 🚀🎯",
            "боргирӣ": "ҷунбида истодааст, косаро гирифта каме сабр кун! 🔄⏳",
            "танзимот": "корхонаи танзим-манзим (Куртаи овнер) ⚙️🛠️",
            "даъват кардани дӯстон": "беақлора фарёд кун, маҳалларо калон кунем! 👥📣",
            "пайвастшавӣ": "ҷунбида истодааст... 🔄",
            "намоён": "дар ҳамин ҷояй! 😎",
            "дастгирӣ": "ёрдамчиҳо 🤝",
            "ҳамён": "хизнаи пул 💰",
            "тавозун": "каш (баланс) 💵",
            "паёмҳо": "смсҳои ҳавоӣ 💬",
            "паём": "смс-и ҳавоӣ 💬",
            "рақами телефон": "номери гудок 📱",
            "зангҳо": "гудокҳо 📞",
            "гурӯҳи нав": "кампанияи нав 👥",
            "канали нав": "маҳаллаи нав 📢",
            "махфият": "ба касе нагӯ 🔐",
            "акс": "сурати безеб 🖼️",
            "видео": "кино 🎬",
            "хатогӣ": "расвоӣ 🛑",
            "дӯстон": "ҷӯраҳо 👥",
            "баромадан": "ҷуфтро задан 🚪"
        }

        print("=== 🎭 STARTING MASSIVE DEEP PRANK LANGUAGE GENERATION ===")

        if not os.path.exists(source_tg):
            print("⚠️ ERROR: values-tg/strings.xml ёфт нашуд!")
            exit(1)

        parser = etree.XMLParser(strip_cdata=False, recover=True, resolve_entities=False)
        tree = etree.parse(source_tg, parser=parser)
        root = tree.getroot()

        count = 0
        for elem in root.findall('string'):
            attr_name = elem.get('name')
            
            if attr_name == "LanguageName":
                elem.text = "Тоҷикӣ (Лаҳҷавӣ) 🎭"
                continue
            if attr_name == "LanguageNameInEnglish":
                elem.text = "Tajik (Slang)"
                continue

            if elem.text and len(elem.text.strip()) > 0:
                text_text = elem.text

                # ЗИРЕҲИ ТЕХНИКИИ КУШОД: Кодҳои заводиро маҳкам мекунем, то барнома нашиканад
                placeholders = re.findall(r'(%[0-9]\$\s*[a-zA-Z]|%[d-s]|\n|\\n|\\t|\\\'|\\\"|\*\*.*?\*\*)', text_text)
                protected_text = text_text
                for i, ph in enumerate(placeholders):
                    protected_text = protected_text.replace(ph, f" [[PH_{i}]] ")

                # Коркарди чуқури тамоми ҷумлаҳо аз рӯи калимаҳо ва пасвандҳо
                for normal_word, slang_word in prank_dictionary.items():
                    protected_text = re.sub(r'\b' + re.escape(normal_word) + r'\b', slang_word, protected_text, flags=re.IGNORECASE)
                    protected_text = re.sub(r'\b' + re.escape(normal_word) + r'ро\b', slang_word + "ро", protected_text, flags=re.IGNORECASE)
                    protected_text = re.sub(r'\b' + re.escape(normal_word) + r'да\b', slang_word + "да", protected_text, flags=re.IGNORECASE)
                    protected_text = re.sub(r'\b' + re.escape(normal_word) + r'и\b', slang_word + "и", protected_text, flags=re.IGNORECASE)

                # Барқарор кардани кодҳои заводӣ саҳеҳ ба ҷои худ
                for i, ph in enumerate(placeholders):
                    protected_text = protected_text.replace(f"[[PH_{i}]]", ph).replace(f"[[PH_ {i}]]", ph)

                elem.text = protected_text
                count += 1

        header_comment = "<!-- 👑 TAJGRAM VIP OFFICIAL SLANG LANGUAGE SYSTEM - DEVELOPED BY CHIEF DEVELOPER SAIDJUN (2025-2030) -->\n"
        with open(target_file, 'wb') as f:
            f.write(header_comment.encode('utf-8'))
            f.write(etree.tostring(tree, pretty_print=True, xml_declaration=False, encoding='utf-8'))

        print(f"=== 🎉 SUCCESS: {count} STRINGS DEEPLY CONVERTED TO PRANK SECURELY ===")
        EOF
        python prank_script.py

    - name: Commit and Push Prank Language
      run: |
        git config --global user.name "Saidjun Chief Developer"
        git config --global user.email "saidjun@tajgram.messenger"
        git add TMessagesProj/src/main/res/values-tg-rQA/strings.xml
        git commit -m "👑 🎭 TAJGRAM PRANK SYSTEM: 100% Deep Prank Base Activated" || echo "No changes"
        git push origin HEAD:master --force
