name: 🎭 Tajgram Prank Language Generator
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  make_prank_lang:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Tajgram Repository
      uses: actions/checkout@v4
      with:
        ref: master
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Advanced XML Parser
      run: |
        pip install lxml

    - name: Generate Massive特殊 Tajik Slang and Prank Matrix
      run: |
        cat << 'EOF' > prank_script.py
        import os
        import re
        from lxml import etree

        source_tg = 'TMessagesProj/src/main/res/values-tg/strings.xml'
        target_file = source_tg

        prank_dictionary = {
            "дар шабака": "ҳози ҳамиҷа бд, пирхар! 🏃‍♂️💨",
            "ба қарибӣ дида шудааст": "инав гум шуд, ҳамин атрофда пир-пир дошт! 🕒",
            "навишта истодааст": "гумш кн, беақл фикр дорад! ✍️🧠",
            "хомӯш кардани огоҳиҳо": "даҳанашро маҳкам кун! 🤐❌",
            "паёмҳои маҳфузшуда": "хизнаи махфии худам 📦🔒",
            "нест кардани чат": "гумаш кун, izзу нишонаш намонад! 💣🗑️",
            "паём фиристода шуд": "тир барин парид! 🚀🎯",
            "боргирӣ": "ҷунбида истодааст, сабр кун! 🔄⏳",
            "танзимот": "корхонаи танзим-манзим (Куртаи овнер) ⚙️🛠️",
            "даъват кардани дӯстон": "беақлора фарёд кун! 👥📣",
            "пайвастшавӣ": "ҷунбида истодааст... 🔄",
            "намоён": "дар ҳамин ҷояй! 😎",
            "дастгирӣ": "ёрдамчиҳо 🤝",
            "ҳамён": "хизнаи пул 💰",
            "тавозун": "каш (баланс) 💵",
            "паёмҳо": "смсҳои ҳавоӣ 💬",
            "паём": "смс-и ҳавоӣ 💬",
            "рақами телефон": "номери гудок 📱",
            "зангҳо": "гудокҳо 📞",
            "гурӯҳи нав": "кампанияи нав 👥",
            "канали нав": "маҳаллаи нав 📢",
            "махфият": "ба касе нагӯ 🔐",
            "акс": "сурати безеб 🖼️",
            "видео": "кино 🎬",
            "хатогӣ": "расвоӣ 🛑",
            "дӯстон": "ҷӯраҳо 👥",
            "баромадан": "ҷуфтро задан 🚪"
        }

        print("=== 🎭 STARTING DEEP WORD PRANK ENGINE IN VALUES-TG ===")

        if not os.path.exists(source_tg):
            print("⚠️ ERROR: values-tg/strings.xml ёфт нашуд!")
            exit(1)

        parser = etree.XMLParser(strip_cdata=False, recover=True, resolve_entities=False)
        tree = etree.parse(source_tg, parser=parser)
        root = tree.getroot()

        count = 0
        for elem in root.findall('string'):
            attr_name = elem.get('name')
            
            if attr_name == "LanguageName":
                elem.text = "Тоҷикӣ (Лаҳҷавӣ) 🎭"
                continue
            if attr_name == "LanguageNameInEnglish":
                elem.text = "Tajik (Slang)"
                continue

            if elem.text and len(elem.text.strip()) > 0:
                text_text = elem.text

                placeholders = re.findall(r'(%[0-9]\$\s*[a-zA-Z]|%[d-s]|\n|\\n|\\t|\\\'|\\\"|\*\*.*?\*\*)', text_text)
                protected_text = text_text
                for i, ph in enumerate(placeholders):
                    protected_text = protected_text.replace(ph, f" [[PH_{i}]] ")

                for normal_word, slang_word in prank_dictionary.items():
                    protected_text = re.sub(r'\b' + re.escape(normal_word) + r'\b', slang_word, protected_text, flags=re.IGNORECASE)

                for i, ph in enumerate(placeholders):
                    protected_text = protected_text.replace(f"[[PH_{i}]]", ph).replace(f"[[PH_ {i}]]", ph)

                elem.text = protected_text
                count += 1

        header_comment = "<!-- 👑 TAJGRAM VIP OFFICIAL SLANG LANGUAGE SYSTEM -->\n"
        with open(target_file, 'wb') as f:
            f.write(header_comment.encode('utf-8'))
            f.write(etree.tostring(tree, pretty_print=True, xml_declaration=False, encoding='utf-8'))

        print(f"=== 🎉 SUCCESS: {count} STRINGS PRANKED INSIDE VALUES-TG ===")
        EOF
        python prank_script.py

    - name: Commit and Secure Push to Master Branch Direct
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "Saidjun Chief Developer"
        git config --global user.email "saidjun@tajgram.messenger"
        git add TMessagesProj/src/main/res/values-tg/strings.xml
        git commit -m "👑 🎭 TAJGRAM PRANK: Integrated Slang inside official Tajik locale" || echo "No changes"
        # Пайваст кардани Токени амниятӣ мустақим ба URL-и пуш барои сабти 100%-а
        git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@://github.com{{ github.repository }}.git
        git push origin HEAD:master --force
