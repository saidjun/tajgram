name: Fix Package Core Only

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code master
      uses: actions/checkout@v4
      with:
        clean: true
        ref: master
        token: ${{ secrets.GITHUB_TOKEN }}

    # МАҶБУРАН ТАБДИЛ ДОДАНИ САТРИ PACKAGE БА БРЕНДИ ШАХСИИ ТАҶГРАМ
    - name: Run Core Package Fixer
      run: |
        git config --global user.name "Saidjun Chief Developer"
        git config --global user.email "saidjun@tajgram.messenger"

        echo "=== ОҒОЗИ ИСЛОҲИ ТЕХНИКИИ ПАКЕТИ ТАҶГРАМ ==="
        
        # Фармони ҳушманд: Табдили умумии пакетҳои заводии Telegram ба оргинал Бренди Tajgram
        find . -name "*.java" -exec sed -i 's/package org.telegram.messenger;/package org.tajgram.messenger;/g' {} \;
        find . -name "BuildVars.java" -exec sed -i 's/package org.telegram.messenger;/package org.tajgram.messenger;/g' {} \;

        echo "=== САБТИ РАСМӢ БА GITHUB ==="
        git add .
        git commit -m "🔥 PACKAGE REPAIRED: Core structure fully synced to org.tajgram.messenger" || echo "Аллакай ислоҳ шудааст"
        git push origin HEAD:master --force
