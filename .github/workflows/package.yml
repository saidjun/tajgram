name: Legal Core Restore and Independent Tajgram Brand

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  legal_sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code master
      uses: actions/checkout@v4
      with:
        clean: true
        ref: master
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Execute Strict Core and Brand Separation
      run: |
        git config --global user.name "Saidjun Chief Developer"
        git config --global user.email "saidjun@tajgram.messenger"

        echo "=== 1. ҚОНУНИ МАТОР: БАРҚАРОР КАРДАНИ ТАМОМИ ЯДРО, ПАКЕТҲО ВА ИМПОРТҲО ==="
        # Ислоҳи пакетҳо ва импортҳо дар Java
        find . -name "*.java" -exec sed -i 's/package org.tajgram.messenger;/package org.telegram.messenger;/g' {} \;
        find . -name "*.java" -exec sed -i 's/import org.tajgram.messenger./import org.telegram.messenger./g' {} \;
        find . -name "*.java" -exec sed -i 's/package org.tajgram.tgnet;/package org.telegram.tgnet;/g' {} \;
        find . -name "*.java" -exec sed -i 's/import org.tajgram.tgnet./import org.telegram.tgnet./g' {} \;
        find . -name "*.java" -exec sed -i 's/package org.tajgram.ui;/package org.telegram.ui;/g' {} \;
        find . -name "*.java" -exec sed -i 's/import org.tajgram.ui./import org.telegram.ui./g' {} \;
        
        # Ислоҳи импортҳо дар Kotlin
        find . -name "*.kt" -exec sed -i 's/import org.tajgram.tgnet/import org.telegram.tgnet/g' {} \;
        find . -name "*.kt" -exec sed -i 's/import org.tajgram.messenger/import org.telegram.messenger/g' {} \;

        # Ислоҳи конфигуратсияҳои техникӣ (gradle, manifest, ini, properties, xml)
        find . -type f \( -name "build.gradle" -o -name "AndroidManifest.xml" -o -name "BuildVars.java" -o -name "*.ini" -o -name "*.properties" -o -name "*.xml" \) -exec sed -i 's/org.tajgram.tgnet/org.telegram.tgnet/g' {} \;
        find . -type f \( -name "build.gradle" -o -name "AndroidManifest.xml" -o -name "BuildVars.java" -o -name "*.ini" -o -name "*.properties" -o -name "*.xml" \) -exec sed -i 's/org.tajgram.ui/org.telegram.ui/g' {} \;
        find . -name "*.xml" -exec sed -i 's/org\.tajgram\.messenger/org.telegram.messenger/g' {} \;

        echo "=== 2. ҚОНУНИ БРЕНД: МУСТАҚИЛИЯТ ВА БРЕНДИНГИ ТАҶГРАМ ==="
        if [ -f "TMessagesProj_App/build.gradle" ]; then
          sed -i 's/applicationId "org.telegram.messenger"/applicationId "org.tajgram.messenger"/g' TMessagesProj_App/build.gradle
        fi
        find . -name "strings.xml" -exec sed -i 's/<string name="AppName">Telegram<\/string>/<string name="AppName">Tajgram<\/string>/g' {} \;
        find . -name "strings.xml" -exec sed -i 's/<string name="AppNameBeta">Telegram Beta<\/string>/<string name="AppNameBeta">Tajgram Beta<\/string>/g' {} \;

        echo "=== 3. ИСЛОҲИ РОБИТАИ NATIVE C++ (ҶИГАР) ==="
        find . -name "NativeLoader.cpp" -exec sed -i 's/Java_org_tajgram_messenger/Java_org_telegram_messenger/g' {} \;
        find . -name "*.cpp" -exec sed -i 's/org\/tajgram\/messenger/org\/telegram\/messenger/g' {} \;

        echo "=== 4. ИСЛОҲИ ТАНЗИМОТИ ЯДРО (BUILDVARS - ҚАЛБ) ==="
        find . -name "BuildVars.java" -exec sed -i 's/org.tajgram.messenger/org.telegram.messenger/g' {} \;

        echo "=== 5. САБТИ РАСМӢ ВА ПУШ БА GITHUB ==="
        git add .
        git commit -m "⚙️ LEGAL SYNC: Full Core restoration. Engine: Telegram, Identity: Tajgram." || echo "Ҳама чиз аллакай ҷо ба ҷо аст"
        git push origin HEAD:master --force
