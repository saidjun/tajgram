name: Inject VIP Themes and Smart Features Safely
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inject_features:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Fresh
        uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 0

      - name: Hard Repair Gradle and Inject Config
        run: |
          # 1. Тозакунии 100% пеш аз запуск (Муҳофизати ядро аз хатогиҳо)
          git reset --hard HEAD
          git clean -fd
          
          # 2. ТОЗАКУНИИ ТАКРОРИҲО (Пешгирӣ аз дубликат шудани блоки имзо)
          find . -type f -name "build.gradle" | while read -r gradle_file; do
            sed -i '/buildFeatures {/d' "$gradle_file"
            sed -i '/buildConfig true/d' "$gradle_file"
            sed -i '/signingConfigs {/d' "$gradle_file"
            sed -i '/tajgram_key/d' "$gradle_file"
            sed -i '/signingConfig signingConfigs.debug/d' "$gradle_file"
          done

          # 3. Таъмири Системавии Грэдл ва Ивазкунии Тағйирёбандаҳо
          find . -type f -name "build.gradle" -exec sed -i 's/APP_VERSION_NAME/\"APP_VERSION_NAME\"/g' {} +
          find . -type f -name "build.gradle" -exec sed -i 's/APP_PACKAGE/\"org.tajgram.messenger\"/g' {} +
          
          # Сӯзандору кардани Блоки тоза ва заводии имзо мустақим ба даруни "android {" (Бо синтаксиси бехатари bash)
          find . -type f -name "build.gradle" -exec sed -i '/android {/a \    buildFeatures { buildConfig true }\n    signingConfigs {\n        debug {\n            storePassword "android"\n            keyPassword "android"\n            keyAlias "tajgram_key"\n        }\n    }\n    buildTypes {\n        release {\n            signingConfig signingConfigs.debug\n        }\n    }' {} +
          
          # Таъмири калидҳои амниятии имзои лоиҳа
          find . -type f -name "build.gradle" -exec sed -i 's/RELEASE_STORE_PASSWORD/\"android\"/g' {} +
          find . -type f -name "build.gradle" -exec sed -i 's/RELEASE_KEY_PASSWORD/\"android\"/g' {} +
          find . -type f -name "build.gradle" -exec sed -i 's/RELEASE_KEY_ALIAS/\"tajgram_key\"/g' {} +
          
          # 4. Сабти софи расо 17 функсияи асосии VIP ба local.properties
          echo "THEMES_ENABLED=true" > local.properties
          echo "SMART_NIGHT_MODE=true" >> local.properties
          echo "DEFAULT_THEME=Tajgram_Dark_VIP" >> local.properties
          echo "TAJ_STICKERS_URL=DYNAMIC_FROM_BASE" >> local.properties
          echo "AUTO_UPDATE_STICKERS=true" >> local.properties
          echo "OFFICIAL_CHANNEL=-1002182441712" >> local.properties
          echo "OWNER_MASK_NAME=saidjon - Tajgram" >> local.properties
          echo "OWNER_SECRET_ID=6967256070" >> local.properties
          echo "SHOW_USER_AND_CHAT_ID=true" >> local.properties
          echo "BLACK_CURTAIN_STORIES_LOCK=true" >> local.properties
          echo "HIGH_VIP_SECRET_PROFILE=true" >> local.properties
          echo "DUROV_PRIVACY_LOCK=true" >> local.properties
          echo "OWNER_ANTI_DELETE_LOGGING=true" >> local.properties
          echo "MAIN_OWNER_ADMIN_PANEL=true" >> local.properties
          echo "ANTI_SCREENSHOT_SAFE_MEDIA=true" >> local.properties
          echo "MULTILANG_WELCOME_BELL=true" >> local.properties
          echo "AUTO_SUGGEST_OFFICIAL_CHANNEL=true" >> local.properties

      - name: Commit and Push Changes Back to GitHub
        run: |
          git config --global user.name "Saidjun Chief Developer"
          git config --global user.email "actions@github.com"
          git add .
          git diff-index --quiet HEAD || git commit -m "Fix all gradle and signing issues together with 17 features safely without duplicates"
          git push origin HEAD:${{ github.ref }}
