env:
  name: Tajgram Final Factory
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🛠️ Пӯшонидани Оммавии Матнҳо бо CDATA аз рӯи Шаблон
        run: |
          python3 -c "
          import re, os

          english_file = 'TMessagesProj/src/main/res/values/strings.xml'
          tajik_file = 'TMessagesProj/src/main/res/values-tg/strings.xml'
          output_file = 'tajgram_factory_clean.xml'

          if not os.path.exists(english_file) or not os.path.exists(tajik_file):
              print('❌ Файлҳои аслӣ ёфт нашуданд!')
              exit(1)

          # 1. Танҳо матнҳои тоҷикиро аз тегҳо ҷудо карда мегирем
          tg_dict = {}
          with open(tajik_file, 'r', encoding='utf-8') as f:
              tg_content = f.read()

          # Ивази аввалияи хатогиҳои маъмули сатри нав (/n)
          tg_content = tg_content.replace('/n/', '\\n').replace('/n', '\\n')

          tg_pattern = r'<string[^>]*name=\"([^\"]+)\"[^>]*>(.*?)</string>'
          for m in re.finditer(tg_pattern, tg_content, flags=re.DOTALL):
              name = m.group(1)
              text = m.group(2).strip()
              
              # Ислоҳи фосилаҳои хатои тағирёбандаҳо пеш аз бандубаст
              text = re.sub(r'%\s*(\d+)\s*\$\s*s', r'%\1$s', text)
              text = re.sub(r'%\s*(\d+)\s*\$\s*d', r'%\1$d', text)
              text = re.sub(r'%\s*d', '%d', text)
              text = re.sub(r'%\s*s', '%s', text)
              
              tg_dict[name] = text

          # 2. Хониши Шаблони заводии англисӣ
          with open(english_file, 'r', encoding='utf-8') as f:
              eng_content = f.read()

          def inject_with_cdata(match):
              full_tag = match.group(0)
              tag_open = match.group(1)
              name = match.group(2)
              tag_close = match.group(3)
              eng_text = match.group(4)

              if name in tg_dict and tg_dict[name]:
                  tg_text = tg_dict[name]

                  # Агар дар матни тоҷикӣ аллакай CDATA набошад, онро ба дохили CDATA мегирем
                  if not tg_text.startswith('<![CDATA['):
                      # Муҳофизати 100% заводии матни тоҷикӣ аз шикастани XML
                      tg_text = f'<![CDATA[{tg_text}]]>'

                  return f'{tag_open}{name}{tag_close}{tg_text}</string>'
              
              # Агар тарҷума набошад, худи англисиаш мемонад, то барнома ҳангоми сохтан хато накунад
              if not eng_text.startswith('<![CDATA['):
                  eng_text = f'<![CDATA[{eng_text}]]>'
              return f'{tag_open}{name}{tag_close}{eng_text}</string>'

          # Ивазкунии оммавӣ ва бехатар дар тамоми 11 000 сатр
          search_pattern = r'(<string[^>]*name=\")([^\"]+)(\"[^>]*>)(.*?)</string>'
          final_xml = re.sub(search_pattern, inject_with_cdata, eng_content, flags=re.DOTALL)

          with open(output_file, 'w', encoding='utf-8') as f:
              f.write(final_xml)
          print('✅ Файли 100% заводию муҳофизатшуда сохта шуд!')
          "

      - name: 💾 Сабти файл ба Мастер
        run: |
          git config user.name "Tajgram Fixer Bot"
          git config user.email "fixer@bot.internal"
          
          if [ -f "tajgram_factory_clean.xml" ]; then
            git add tajgram_factory_clean.xml
            git commit -m "📦 Protected mass production via CDATA block [skip ci]" || echo "Татбиқи нав нест"
            git push origin HEAD:master --force
          else
            echo "❌ Хатогӣ: файл сохта нашуд!"
            exit 1
          fi
