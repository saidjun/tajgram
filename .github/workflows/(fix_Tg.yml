name: Tajgram Final Factory
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🧠 Роботи Ҳушманд — Коркарди Дақиқи Контекстӣ Сатр ба Сатр
        run: |
          python3 -c "
          import re, os

          english_file = 'TMessagesProj/src/main/res/values/strings.xml'
          tajik_file = 'TMessagesProj/src/main/res/values-tg/strings.xml'
          output_file = 'tajgram_factory_clean.xml'

          if not os.path.exists(english_file) or not os.path.exists(tajik_file):
              print('❌ Файлҳои аслӣ ёфт нашуданд!')
              exit(1)

          # 1. Скан кардани Шаблони Англисӣ
          eng_dict = {}
          with open(english_file, 'r', encoding='utf-8') as f:
              eng_content = f.read()
          
          pattern = r'<string[^>]*name=\"([^\"]+)\"[^>]*>(.*?)</string>'
          for m in re.finditer(pattern, eng_content, flags=re.DOTALL):
              eng_dict[m.group(1)] = m.group(2)

          # 2. Хондани файли Тоҷикӣ
          with open(tajik_file, 'r', encoding='utf-8') as f:
              tg_content = f.read()

          # Ивази аввалияи хатогиҳои маъмури /n
          tg_content = tg_content.replace('/n/', '\\n').replace('/n', '\\n')

          # Алгоритми интеллектуалии ҷойгиркунии аломатҳо дар контекст
          def advanced_context_fix(name, eng_text, tg_text):
              # Тоза кардани фосилаҳои хато дар тағирёбандаҳо
              tg_text = re.sub(r'%\s*(\d+)\s*\$\s*s', r'%\1$s', tg_text)
              tg_text = re.sub(r'%\s*(\d+)\s*\$\s*d', r'%\1$d', tg_text)
              tg_text = re.sub(r'%\s*d', '%d', tg_text)
              tg_text = re.sub(r'%\s*s', '%s', tg_text)

              # Ислоҳи аломатҳои сатри нав (\n) аз рӯи мавқеи англисӣ
              if '\\n\\n' in eng_text and '\\n\\n' not in tg_text:
                  if '%1$s' in tg_text:
                      tg_text = tg_text.replace('%1$s', '\\n\\n%1$s\\n\\n')
                  elif '%s' in tg_text:
                      tg_text = tg_text.replace('%s', '\\n\\n%s\\n\\n')

              # Барқарор кардани ситорачаҳо (**) дар атрофи тағирёбандаҳо, агар гум шуда бошанд
              for var in ['%1$s', '%2$s', '%3$s', '%d', '%s']:
                  if f'**{var}**' in eng_text and f'**{var}**' not in tg_text:
                      tg_text = tg_text.replace(var, f'**{var}**')

              # Экранизатсияи дақиқи синтаксиси заводии XML
              tg_text = tg_text.replace(\"\\\'\", \"'\").replace(\"'\", \"\\'\")
              tg_text = tg_text.replace('\\\"', '\"').replace('\"', '\\\"')
              tg_text = re.sub(r'&(?!([a-zA-Z0-9]+|#[0-9]+);)', '&amp;', tg_text)
              
              return tg_text.strip()

          def process_xml_tags(match):
              tag_open = match.group(1)
              name = match.group(2)
              tag_close = match.group(3)
              tg_text = match.group(4)

              if name in eng_dict and tg_text:
                  fixed_text = advanced_context_fix(name, eng_dict[name], tg_text)
                  return f'{tag_open}{name}{tag_close}{fixed_text}</string>'
              return match.group(0)

          # Коркарди дақиқи ҳамаи 11 000 сатр бо мантиқи контекстӣ
          search_pattern = r'(<string[^>]*name=\")([^\"]+)(\"[^>]*>)(.*?)</string>'
          final_xml = re.sub(search_pattern, process_xml_tags, tg_content, flags=re.DOTALL)

          # Сабти файл
          with open(output_file, 'w', encoding='utf-8') as f:
              f.write(final_xml)
          print('✅ Файли заводии тоза бо мантиқи ҳушманд сохта шуд!')
          "

      - name: 💾 Сабти файл ба Мастер
        run: |
          git config user.name "Tajgram Fixer Bot"
          git config user.email "fixer@bot.internal"
          
          if [ -f "tajgram_factory_clean.xml" ]; then
            git add tajgram_factory_clean.xml
            git commit -m "🧠 Advanced human-like context localization fix [skip ci]" || echo "Татбиқи нав нест"
            git push origin HEAD:master --force
          else
            echo "❌ Хатогӣ: файл сохта нашуд!"
            exit 1
          fi
