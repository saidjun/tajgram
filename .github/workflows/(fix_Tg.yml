name: Tajgram Final Factory
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🧠 Роботи Умнӣ — Ислоҳи Сатр ба Сатр бо Сохтори Англисӣ
        run: |
          python3 -c "
          import re, os

          english_file = 'TMessagesProj/src/main/res/values/strings.xml'
          tajik_file = 'TMessagesProj/src/main/res/values-tg/strings.xml'
          output_file = 'tajgram_factory_clean.xml'

          if not os.path.exists(english_file) or not os.path.exists(tajik_file):
              print('❌ Файлҳои аслӣ ёфт нашуданд!')
              exit(1)

          # 1. Скан ва захираи базаи заводии Англисӣ
          eng_dict = {}
          with open(english_file, 'r', encoding='utf-8') as f:
              eng_content = f.read()
          
          pattern = r'<string[^>]*name=\"([^\"]+)\"[^>]*>(.*?)</string>'
          for m in re.finditer(pattern, eng_content, flags=re.DOTALL):
              eng_dict[m.group(1)] = m.group(2)

          # 2. Хониши файли Тоҷикӣ сатр ба сатр
          with open(tajik_file, 'r', encoding='utf-8') as f:
              tg_lines = f.readlines()

          fixed_lines = []

          # Функцияи интеллектуалии робот барои барқарории аломатҳо
          def smart_reconstruct(name, eng_text, tg_text):
              # Аломатҳои техникии нодурустро аввал тоза ва заводи мекунем
              tg_text = tg_text.replace('/n/', '\\n').replace('/n', '\\n')
              tg_text = re.sub(r'%\s*(\d+)\s*\{\s*s', r'%\1$s', tg_text)
              tg_text = re.sub(r'%\s*(\d+)\s*\$\s*s', r'%\1$s', tg_text)
              tg_text = re.sub(r'%\s*(\d+)\s*\$\s*d', r'%\1$d', tg_text)
              tg_text = re.sub(r'%\s*d', '%d', tg_text)
              tg_text = re.sub(r'%\s*s', '%s', tg_text)

              # Таҳлили калимаҳо ва аломатҳо аз нусхаи англисӣ
              # Ёфтани ҳамаи аломатҳои махсуси техникӣ дар англисӣ (**, \n, %1$s, тегҳо)
              tokens = re.findall(r'(\*\*|\\n|%\d+\$[sd]|%[sd]|<[^>]+>)', eng_text)
              
              for token in tokens:
                  if token not in tg_text:
                      # Робот интеллектуалӣ аломатро вобаста ба ҷояш ба тоҷикӣ илова мекунад
                      if token == '\\n' or token == '\\n\\n':
                          if '%1$s' in tg_text and '\\n' not in tg_text:
                              tg_text = tg_text.replace('%1$s', f'{token}%1$s')
                          else:
                              tg_text = tg_text + token
                      elif token == '**':
                          # Агар ситорачаҳо барои ғафскунӣ гум шуда бошанд
                          if '%1$s' in tg_text and '**%1$s**' not in tg_text:
                              tg_text = tg_text.replace('%1$s', '**%1$s**')
                          if '%2$s' in tg_text and '**%2$s**' not in tg_text:
                              tg_text = tg_text.replace('%2$s', '**%2$s**')

              # Экранизатсияи қатъии синтаксиси Array ва XML
              tg_text = tg_text.replace(\"\\\'\", \"'\").replace(\"'\", \"\\'\")
              tg_text = re.sub(r'&(?!([a-zA-Z0-9]+|#[0-9]+);)', '&amp;', tg_text)
              
              return tg_text.strip()

          # Раванди коркарди сатр ба сатр
          for line in tg_lines:
              match = re.search(r'(<string[^>]*name=\"([^\"]+)\"[^>]*>)(.*?)(</string>)', line, flags=re.DOTALL)
              
              if match:
                  tag_open, name, tg_text, tag_close = match.groups()
                  
                  if name in eng_dict:
                      # Робот бо диққат матнро таҳлил ва ислоҳ мекунад
                      clean_tg_text = smart_reconstruct(name, eng_dict[name], tg_text)
                      fixed_lines.append(f'{tag_open}{clean_tg_text}{tag_close}\n')
                  else:
                      fixed_lines.append(line)
              else:
                  fixed_lines.append(line)

          # 3. Сабти файл
          with open(output_file, 'w', encoding='utf-8') as f:
              f.writelines(fixed_lines)
          print('✅ Робот файли супер-босифатро омода кард!')
          "

      - name: 💾 Сабти файл ба Мастер
        run: |
          git config user.name "Tajgram Fixer Bot"
          git config user.email "fixer@bot.internal"
          
          if [ -f "tajgram_factory_clean.xml" ]; then
            git add tajgram_factory_clean.xml
            git commit -m "🧠 AI Intelligence factory string fix [skip ci]" || echo "Татбиқи нав нест"
            git push origin HEAD:master --force
          else
            echo "❌ Хатогӣ: файл сохта нашуд!"
            exit 1
          fi
