name: Tajgram Final Factory
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🧠 Роботи Умнӣ — Ивазкунии Тезкори Тексти Тоҷикӣ дар Шаблони Англисӣ
        run: |
          python3 -c "
          import re, os

          english_file = 'TMessagesProj/src/main/res/values/strings.xml'
          tajik_file = 'TMessagesProj/src/main/res/values-tg/strings.xml'
          output_file = 'tajgram_factory_clean.xml'

          if not os.path.exists(english_file) or not os.path.exists(tajik_file):
              print('❌ Файлҳои аслӣ ёфт нашуданд!')
              exit(1)

          # 1. Танҳо матни тоҷикиро аз тегҳо ҷудо карда ба база мегирем
          tg_dict = {}
          with open(tajik_file, 'r', encoding='utf-8') as f:
              tg_content = f.read()
          
          # Тоза кардани хатогиҳои маъмули /n дар файли тоҷикӣ пеш аз сабт
          tg_content = tg_content.replace('/n/', '\\n').replace('/n', '\\n')

          tg_pattern = r'<string[^>]*name=\"([^\"]+)\"[^>]*>(.*?)</string>'
          for m in re.finditer(tg_pattern, tg_content, flags=re.DOTALL):
              # Текстҳоро тоза мекунем аз аломатҳои хатои техникӣ
              text = m.group(2).strip()
              text = re.sub(r'%\s*(\d+)\s*\$\s*s', r'%\1$s', text)
              text = re.sub(r'%\s*(\d+)\s*\$\s*d', r'%\1$d', text)
              tg_dict[m.group(1)] = text

          # 2. Файли аслии англисиро мехонем, ки сохтораш 100% заводи аст
          with open(english_file, 'r', encoding='utf-8') as f:
              eng_content = f.read()

          # Функцияи ивазкунии тезкор бе вайрон кардани аломатҳои техникӣ
          def inject_tajik(match):
              full_tag = match.group(0)
              tag_open = match.group(1)
              name = match.group(2)
              tag_close = match.group(3)
              eng_text = match.group(4)

              if name in tg_dict and tg_dict[name]:
                  tg_text = tg_dict[name]
                  
                  # Агар дар англисӣ аломатҳои махсус бошанд, онҳоро дар тоҷикӣ маҷбурӣ мечаспонем
                  if '**' in eng_text and '**' not in tg_text:
                      # Агар тағирёбандаҳо бошанд, ситорачаҳоро ба канори онҳо мебарем
                      tg_text = tg_text.replace('%1$s', '**%1$s**').replace('%2$s', '**%2$s**')
                  
                  if '\\n' in eng_text and '\\n' not in tg_text:
                      if '%1$s' in tg_text:
                          tg_text = tg_text.replace('%1$s', '\\n\\n%1$s\\n\\n')
                      else:
                          tg_text = tg_text + '\\n'

                  # Экранизатсияи қатъии синтаксиси XML
                  tg_text = tg_text.replace(\"\\\'\", \"'\").replace(\"'\", \"\\'\")
                  tg_text = re.sub(r'&(?!([a-zA-Z0-9]+|#[0-9]+);)', '&amp;', tg_text)
                  
                  return f'{tag_open}{name}{tag_close}{tg_text}</string>'
              
              # Агар тарҷума набошад, худи англисиаш мемонад то барнома хато накунад
              return full_tag

          # Ивазкунии оммавӣ дар тамоми 11 000 сатр аз рӯи шаблони англисӣ
          search_pattern = r'(<string[^>]*name=\")([^\"]+)(\"[^>]*>)(.*?)</string>'
          final_xml = re.sub(search_pattern, inject_tajik, eng_content, flags=re.DOTALL)

          # 3. Сабти файл
          with open(output_file, 'w', encoding='utf-8') as f:
              f.write(final_xml)
          print('✅ Файли супер-завонии оммавӣ сохта шуд!')
          "

      - name: 💾 Сабти файл ба Мастер
        run: |
          git config user.name "Tajgram Fixer Bot"
          git config user.email "fixer@bot.internal"
          
          if [ -f "tajgram_factory_clean.xml" ]; then
            git add tajgram_factory_clean.xml
            git commit -m "🧠 Mass production template localization fix [skip ci]" || echo "Татбиқи нав нест"
            git push origin HEAD:master --force
          else
            echo "❌ Хатогӣ: файл сохта нашуд!"
            exit 1
          fi
