name: XML Factory Fixer (Tajik)

on:
  push:
    paths:
      - 'TMessagesProj/src/main/res/values-tg/strings.xml'
  workflow_dispatch:

jobs:
  fix-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Иҷозат барои сабт кардани файл дар папка

    steps:
      - name: 📥 Гирифтани коди лоиҳа аз GitHub
        uses: actions/checkout@v4

      - name: 🐍 Омода кардани муҳити Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🛠️ Иҷрои скрипти ҷарроҳии заводӣ
        run: |
          python -c "
          import xml.etree.ElementTree as ET
          import os

          INPUT_FILE = 'TMessagesProj/src/main/res/values-tg/strings.xml'
          OUTPUT_FILE = 'strings_fixed_master.xml'
          
          if os.path.exists(INPUT_FILE):
              tree = ET.parse(INPUT_FILE)
              root = tree.getroot()

              for elem in root.findall('string'):
                  if elem.text:
                      text = elem.text
                      text = text.replace('/n/', '\\n').replace('/n', '\\n')
                      text = text.replace(\"\\\\'\", \"'\").replace('\\\\\"', '\"')
                      text = text.replace(\"'\", \"\\\\'\").replace('\"', '\\\\\"')
                      elem.text = text

              tree.write(OUTPUT_FILE, encoding='utf-8', xml_declaration=True)
              print('✅ Файл тайёр шуд!')
          "

      - name: 💾 Сабт кардани файл рост дар папкаи асосӣ (Бе ZIP)
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add strings_fixed_master.xml
          # Агар файл нав шуда бошад, онро сабт мекунад
          git diff --quiet && git diff --staged --quiet || (git commit -m "Тозакунии заводии XML" && git push)
