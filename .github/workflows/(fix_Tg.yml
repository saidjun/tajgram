name: XML Factory Fixer (Tajik)

on:
  workflow_dispatch: # Танҳо бо пахши тугмаи дастӣ кор мекунад

permissions:
  contents: write # Иҷозати расмии сабт кардан

jobs:
  fix-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Гирифтани коди лоиҳа
        uses: actions/checkout@v4

      - name: 🐍 Омода кардани Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🛠️ Ҷарроҳии заводӣ (Тозакунӣ)
        run: |
          python -c "
          import xml.etree.ElementTree as ET
          import os

          INPUT = 'TMessagesProj/src/main/res/values-tg/strings.xml'
          OUTPUT = 'strings_fixed_master.xml'
          
          print('⏳ Оғози тозакунии 11000+ сатр...')
          if os.path.exists(INPUT):
              tree = ET.parse(INPUT)
              root = tree.getroot()
              for elem in root.findall('string'):
                  if elem.text:
                      text = elem.text
                      text = text.replace('/n/', '\\n').replace('/n', '\\n')
                      text = text.replace(\"\\\\'\", \"'\").replace('\\\\\"', '\"')
                      text = text.replace(\"'\", \"\\\\'\").replace('\"', '\\\\\"')
                      elem.text = text
              tree.write(OUTPUT, encoding='utf-8', xml_declaration=True)
              print('✅ Файл 100% заводии тоза шуд!')
          else:
              print('❌ Файли аслӣ ёфт нашуд!')
          "

      - name: 💾 Сабти ҳатмӣ ба папкаи асосӣ (Главный)
        run: |
          # 1. Худро муаррифӣ мекунем
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # 2. Файли навро ба рӯйхати сабт илова мекунем
          git add strings_fixed_master.xml
          
          # 3. Вазъиятро нишон медиҳем (барои логҳо)
          git status
          
          # 4. Сабт мекунем ва ба GitHub мефиристем (Push)
          git commit -m "Автоматики: Файли тозашудаи strings_fixed_master.xml илова шуд" || echo "Файл аллакай тоза аст ва тағйироте нест"
          git push || echo "Хатогӣ ҳангоми фиристодан (Push) ба GitHub"
