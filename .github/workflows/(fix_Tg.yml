name: Tajgram Ultimate Fixer

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ultimate-fixer:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Гирифтани код
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Ҳамаи таърихи лоиҳаро мегирад

      - name: 🛠️ Ҷарроҳии Амиқ ва Санҷиши Заводӣ
        run: |
          python3 -c "
          import xml.etree.ElementTree as ET
          import os, sys

          input_file = 'TMessagesProj/src/main/res/values-tg/strings.xml'
          output_file = 'strings_fixed_master.xml'
          
          if not os.path.exists(input_file):
              print(f'❌ ХАТО: Файл дар {input_file} нест!')
              sys.exit(1)

          tree = ET.parse(input_file)
          root = tree.getroot()
          
          for elem in root.findall('string'):
              if elem.text:
                  text = elem.text
                  text = text.replace('/n/', '\\n').replace('/n', '\\n')
                  text = text.replace(\"\\\\'\", \"'\").replace('\\\\\"', '\"')
                  text = text.replace(\"'\", \"\\\\'\").replace('\"', '\\\\\"')
                  if '&' in text and not text.startswith('&amp;'):
                      text = text.replace('&', '&amp;')
                  elem.text = text
          
          tree.write(output_file, encoding='utf-8', xml_declaration=True)
          if os.path.getsize(output_file) > 0:
              print(f'✅ Файли {output_file} омода шуд!')
          else:
              sys.exit(1)
          "

      - name: 💾 Сабти доимӣ ба Master
        run: |
          git config --global user.name "Tajgram Fixer"
          git config --global user.email "bot@tajgram.com"
          
          # Файлро илова мекунем
          git add strings_fixed_master.xml
          
          # Commit мекунем (Агар тағйирот набошад, хато намедиҳад)
          git commit -m "Auto-fix: Фабрикаи заводии strings_fixed.xml" || echo "Тағйироти нав нест"
          
          # Push бо танзимоти амиқ
          git push origin HEAD:master --force
