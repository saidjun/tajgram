name: Tajgram Final Factory
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🛠️ Ислоҳи Маҷбурии Синтаксиси Файли Тоҷикӣ
        run: |
          python3 -c "
          import re, os

          tajik_file = 'TMessagesProj/src/main/res/values-tg/strings.xml'
          output_file = 'tajgram_factory_clean.xml'

          if not os.path.exists(tajik_file):
              print('❌ Файли тоҷикӣ ёфт нашуд!')
              exit(1)

          with open(tajik_file, 'r', encoding='utf-8') as f:
              data = f.read()

          # 1. Ивази ҳамаи /n-ҳои хато ба \n-и техникӣ
          data = data.replace('/n/', '\\n').replace('/n', '\\n')

          # 2. Тезкор тоза кардани фосилаҳои хато дар тағирёбандаҳо (%1$s, %2$s)
          data = re.sub(r'%\s*(\d+)\s*\{\s*s', r'%\1$s', data)
          data = re.sub(r'%\s*(\d+)\s*\$\s*s', r'%\1$s', data)
          data = re.sub(r'%\s*(\d+)\s*\$\s*d', r'%\1$d', data)
          data = re.sub(r'%\s*d', '%d', data)
          data = re.sub(r'%\s*s', '%s', data)

          # 3. Ислоҳи қатъии апострофҳо ва нохунакҳо, ки XML-ро мешикананд
          # Аввал ҳамаи заводиҳоро оддӣ мекунем, баъд аз нав экранизатсия мекунем
          def clean_syntax(match):
              tag_open = match.group(1)
              name = match.group(2)
              tag_close = match.group(3)
              content = match.group(4)

              # Тоза кардани CDATA-ҳои хатои пешина, агар монда бошанд
              content = content.replace('<![CDATA[', '').replace(']]>', '')

              # Экранизатсияи техникӣ
              content = content.replace(\"\\\'\", \"'\").replace(\"'\", \"\\'\")
              content = content.replace('\\\"', '\"').replace('\"', '\\\"')
              content = re.sub(r'&(?!([a-zA-Z0-9]+|#[0-9]+);)', '&amp;', content)

              return f'{tag_open}{name}{tag_close}{content}</string>'

          pattern = r'(<string[^>]*name=\")([^\"]+)(\"[^>]*>)(.*?)</string>'
          final_data = re.sub(pattern, clean_syntax, data, flags=re.DOTALL)

          with open(output_file, 'w', encoding='utf-8') as f:
              f.write(final_data)
          print('✅ Файли тоҷикӣ аз нигоҳи синтаксис солим шуд!')
          "

      - name: 💾 Сабти файл ба Мастер
        run: |
          git config user.name "Tajgram Fixer Bot"
          git config user.email "fixer@bot.internal"
          
          if [ -f "tajgram_factory_clean.xml" ]; then
            git add tajgram_factory_clean.xml
            git commit -m "🛠️ Clean XML syntax and error fixing [skip ci]" || echo "Татбиқи нав нест"
            git push origin HEAD:master --force
          else
            echo "❌ Хатогӣ: файл сохта нашуд!"
            exit 1
          fi
