name: XML Factory Fixer (Tajik)

on:
  workflow_dispatch: # Фақат бо пахши тугма кор мекунад

permissions:
  contents: write # Иҷозати расмии сабт кардан (Ҳатмӣ!)

jobs:
  fix-and-force-push:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Гирифтани коди лоиҳа
        uses: actions/checkout@v4
        with:
          # Маҷбуран ҳамон шохаеро (branch) мегирад, ки ту дар он ҳастӣ
          ref: ${{ github.head_ref || github.ref_name }}

      - name: 🐍 Омода кардани Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🛠️ Ҷарроҳии заводӣ (Тозакунӣ)
        run: |
          python -c "
          import xml.etree.ElementTree as ET
          import os

          INPUT = 'TMessagesProj/src/main/res/values-tg/strings.xml'
          OUTPUT = 'strings_fixed_master.xml'
          
          if os.path.exists(INPUT):
              tree = ET.parse(INPUT)
              root = tree.getroot()
              for elem in root.findall('string'):
                  if elem.text:
                      text = elem.text
                      text = text.replace('/n/', '\\n').replace('/n', '\\n')
                      text = text.replace(\"\\\\'\", \"'\").replace('\\\\\"', '\"')
                      text = text.replace(\"'\", \"\\\\'\").replace('\"', '\\\\\"')
                      elem.text = text
              tree.write(OUTPUT, encoding='utf-8', xml_declaration=True)
              print('✅ Файл 100% заводии тоза шуд!')
          else:
              print('❌ Файли аслӣ ёфт нашуд!')
          "

      - name: 🚀 САБТИ ҚАТЪӢ ВА МАҶБУРӢ (Force Push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Калиди махфии GitHub барои сабт
        run: |
          # 1. Номи ботро муайян мекунем
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # 2. Файли навро ба рӯйхат мегирем
          git add strings_fixed_master.xml
          
          # 3. Сабт мекунем (Commit)
          git commit -m "🚀 Файли заводии strings_fixed_master.xml илова шуд" || echo "Тағйирот аллакай сабт шудааст"
          
          # 4. ФАРМОНИ ҚАТЪӢ: Файлро маҷбуран ба лоиҳа мепартоем (Push)
          git push origin HEAD:${{ github.ref_name }} --force
