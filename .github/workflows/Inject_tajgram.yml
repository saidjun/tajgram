name: Inject Tajgram Walkthrough Module
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  inject_onboarding:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Full Clean and Rebuild
        run: |
          IDS="onboarding_title_1 onboarding_desc_1 onboarding_title_2 onboarding_desc_2 onboarding_title_3 onboarding_desc_3 onboarding_title_4 onboarding_desc_4 onboarding_title_5 onboarding_desc_5 skip_button start_button"
          
          find . -type d -name "values*" | while read -r dir; do
            strings_file="$dir/strings.xml"
            module_file="$dir/tajgram_onboarding.xml"
            lang=$(basename "$dir")
            
            # 1. ТОЗА КАРДАН (Агар strings.xml бошад)
            if [ -f "$strings_file" ]; then
              for id in $IDS; do
                sed -i "/name=\"$id\"/d" "$strings_file"
              done
              echo "CLEANED: $strings_file"
            fi
            
            # 2. МАТНҲО
            if [ "$lang" = "values-tg" ]; then
              STRS='<string name="onboarding_title_1">Хуш омадед! 🌍</string>\n<string name="onboarding_desc_1">Суръат ва бехатарӣ.</string>\n<string name="onboarding_title_2">Бо Ситораҳо дурахшед! ⭐</string>\n<string name="onboarding_desc_2">Имкониятҳои VIP ва тарҷума.</string>\n<string name="onboarding_title_3">Зангулаи шахсӣ 🔊</string>\n<string name="onboarding_desc_3">Интихоби овозҳо ва танзими огоҳиҳо.</string>\n<string name="onboarding_title_4">100% Бехатарӣ 🛡️</string>\n<string name="onboarding_desc_4">Ҳимояи прокси ва зидди ҷосусӣ.</string>\n<string name="onboarding_title_5">Куҷо рафтем! ✨</string>\n<string name="onboarding_desc_5">Ба Ҳолати мардумӣ гузаред ва лаззат баред!</string>\n<string name="skip_button">Гузаштан (X)</string>\n<string name="start_button">Оғоз</string>'
            elif [ "$lang" = "values-fa" ]; then
              STRS='<string name="onboarding_title_1">خوش آمدید! 🌍</string>\n<string name="onboarding_desc_1">سرعت و امنیت.</string>\n<string name="onboarding_title_2">با ستاره‌ها بدرخشید! ⭐</string>\n<string name="onboarding_desc_2">قابلیت‌های ویژه و ترجمه.</string>\n<string name="onboarding_title_3">زنگوله شخصی 🔊</string>\n<string name="onboarding_desc_3">انتخاب صداها و مدیریت هشدارها.</string>\n<string name="onboarding_title_4">امنیت ۱۰۰٪ 🛡️</string>\n<string name="onboarding_desc_4">محافظت پروکسی و ضد جاسوسی.</string>\n<string name="onboarding_title_5">بزن بریم! ✨</string>\n<string name="onboarding_desc_5">به حالت محلی تغییر دهید و لذت ببرید!</string>\n<string name="skip_button">رد شدن (X)</string>\n<string name="start_button">شروع</string>'
            elif [ "$lang" = "values-ar" ]; then
              STRS='<string name="onboarding_title_1">مرحباً بك! 🌍</string>\n<string name="onboarding_desc_1">السرعة والأمان.</string>\n<string name="onboarding_title_2">تألق مع النجوم! ⭐</string>\n<string name="onboarding_desc_2">الميزات المميزة والترجمة.</string>\n<string name="onboarding_title_3">الجرس الشخصي 🔊</string>\n<string name="onboarding_desc_3">اختر الأصوات وإدارة التنبيهات.</string>\n<string name="onboarding_title_4">أمان 100% 🛡️</string>\n<string name="onboarding_desc_4">حماية البروكسي ومضاد التجسس.</string>\n<string name="onboarding_title_5">لننطلق! ✨</string>\n<string name="onboarding_desc_5">انتقل إلى الوضع الشعبي واستمتع!</string>\n<string name="skip_button">تخطى (X)</string>\n<string name="start_button">ابدأ</string>'
            elif [[ "$lang" =~ ^values-(ru|uk|be|kk|uz|az|hy|ky|tk|mo) ]]; then
              STRS='<string name="onboarding_title_1">Добро пожаловать! 🌍</string>\n<string name="onboarding_desc_1">Скорость и безопасность.</string>\n<string name="onboarding_title_2">Сияйте со Звездами! ⭐</string>\n<string name="onboarding_desc_2">Премиум функции и перевод.</string>\n<string name="onboarding_title_3">Личный Звонок 🔊</string>\n<string name="onboarding_desc_3">Выбирайте голоса и управляйте уведомлениями.</string>\n<string name="onboarding_title_4">100% Безопасность 🛡️</string>\n<string name="onboarding_desc_4">Прокси и антишпионская защита.</string>\n<string name="onboarding_title_5">Поехали! ✨</string>\n<string name="onboarding_desc_5">Переключитесь на Народный режим и наслаждайтесь!</string>\n<string name="skip_button">Пропустить (X)</string>\n<string name="start_button">Старт</string>'
            else
              STRS='<string name="onboarding_title_1">Welcome! 🌍</string>\n<string name="onboarding_desc_1">Speed and security.</string>\n<string name="onboarding_title_2">Shine with Stars! ⭐</string>\n<string name="onboarding_desc_2">Premium features & translation.</string>\n<string name="onboarding_title_3">Personal Bell 🔊</string>\n<string name="onboarding_desc_3">Select voices and manage alerts.</string>\n<string name="onboarding_title_4">100% Security 🛡️</string>\n<string name="onboarding_desc_4">Proxy and anti-spy protection.</string>\n<string name="onboarding_title_5">Let’s Go! ✨</string>\n<string name="onboarding_desc_5">Switch to Folk Mode and enjoy!</string>\n<string name="skip_button">Skip (X)</string>\n<string name="start_button">Start</string>'
            fi
            
            # 3. ЭҶОД ВА ТАСДИҚ
            printf '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n%b\n</resources>\n' "$STRS" > "$module_file"
            echo "CREATED: $module_file"
          done

      - name: Commit and Push
        run: |
          git config --global user.name "Saidjun Chief Developer"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Onboarding: Full clean and modular update [skip ci]" || echo "No changes to commit"
          git push origin master
