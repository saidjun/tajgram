name: 1-Second Pure Official Keys Configuration

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync_keys:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Your Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Force Hard-Inject Your Official Keys
        run: |
          git config --global user.name "Saidjun Chief Developer"
          git config --global user.email "saidjun@tajgram.messenger"
          
          # 1. СОХТАНИ ПАПКАҲОИ CONFIG ДАР ТАМОМИ ЛОИҲА
          mkdir -p src/main/config TMessagesProj/src/main/config
          
          # 2. НАВИШТАНИ КАЛИДҲОИ АСЛИИ ТУ БА ФАЙЛҲОИ CONFIG.JAVA
          cat << 'EOF' > src/main/config/Config.java
          package org.telegram.messenger;
          public class Config {
              public static int API_ID = 39951434;
              public static String API_HASH = "fcf607bae206cefb2930121a86459c4b";
          }
          EOF
          
          cat << 'EOF' > TMessagesProj/src/main/config/Config.java
          package org.telegram.messenger;
          public class Config {
              public static int API_ID = 39951434;
              public static String API_HASH = "fcf607bae206cefb2930121a86459c4b";
          }
          EOF

          # 3. НАВИШТАНИ КАЛИДҲОИ АСЛИИ ТУ БА ДОХИЛИ BUILDVARS.JAVA (ИВАЗ КАРДАНИ САТРҲО)
          find . -name "BuildVars.java" | while read file; do
            sed -i 's/public static int APP_ID = .*/public static int APP_ID = 39951434;/g' "$file" 2>/dev/null || true
            sed -i 's/public static String APP_HASH = .*/public static String APP_HASH = "fcf607bae206cefb2930121a86459c4b";/g' "$file" 2>/dev/null || true
          done
          
          # 4. САБТИ РАСМИИ КАЛИДҲО ДАР СAЙТ СAД ФОИЗ БEХAТO
          git add .
          git commit -m "🔑 KEYS LOCKED: Successfully synchronized official API_ID 39951434 and HASH to Config and BuildVars!" || exit 0
          git push origin HEAD:${{ github.ref_name }} --force
