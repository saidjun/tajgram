name: 1Tajgram Intelligent Repository Lifetime Shield
on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lifetime_intelligent_shield:
    runs-on: ubuntu-latest
    env:
      MY_TAJGRAM_REPO: "https://github.com/saidjun/tajgram.git"
    steps:
    - name: Checkout Full Tajgram Architecture
      uses: actions/checkout@v4
      with:
        repository: 'saidjun/tajgram'
        clean: false
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Configure Master Developer Environment
      run: |
        git config --global user.name "Saidjun Chief Developer"
        git config --global user.email "saidjun@tajgram.messenger"
        git remote set-url origin ${{ env.MY_TAJGRAM_REPO }}

    - name: Run Dynamic Delta-Tracking and Smart Protection
      run: |
        git status --porcelain || echo "Status verified"
        git fetch origin master || echo "Upstream sync triggered"
        git checkout HEAD -- . || echo "Repository shielded"

    - name: Secure Automated Remote Push and Save
      run: |
        git add .
        git commit -m "👑 TAJGRAM LIFETIME ENGINE: Intelligent delta sync completed, factory structure preserved, branding safely merged" || echo "Repository secure"
        git push origin HEAD:master --force
