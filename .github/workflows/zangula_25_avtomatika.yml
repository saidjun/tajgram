name: Ultimate Global Tajgram Engine - Cleanup

on: 
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup_engine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Total Cleanup and Reset
        run: |
          # 1. Рӯйхати ҳамаи ID-ҳое, ки бояд аз strings.xml нест шаванд
          IDS="WelcomeBellTitle WelcomeBellDesc WelcomeChannelSuggest WelcomeBellTitle_Reentry WelcomeBellDesc_Reentry ExitDialogTitle ExitDialogDesc TajgramBellCurrencyTitle TajgramBellCurrencyStatus VipSettingsMenuTitle SecretSupportButtonLabel AskAQuestion AskAQuestion_Owner TajgramFolkModeSwitch TajgramFolkModeDesc Folk_Settings Folk_Security Folk_InviteFriends VipSettingsTitle VipSupportBot LikeButton DislikeButton VoiceSelection VoiceIcon_Girl VoiceIcon_Boy"
          
          # 2. Нест кардани ҳамаи ин ID-ҳо аз тамоми файлҳои strings.xml
          find . -type f -name "strings.xml" | while read -r file; do
            for id in $IDS; do
              sed -i "/$id/d" "$file"
            done
            # Тоза кардани сатрҳои холии зиёдатӣ
            sed -i '/^$/d' "$file"
          done

          # 3. Нест кардани файли local.properties (агар сохта шуда бошад)
          rm -f local.properties

      - name: Commit and Push Cleanup
        run: |
          git config --global user.name "Saidjun Chief Developer"
          git config --global user.email "actions@github.com"
          git add .
          git diff-index --quiet HEAD || (git commit -m "Engine Cleanup: Removed all injected features." && git push)
