name: Ultimate Global Tajgram Engine - Cleanup & Reset
on: [workflow_dispatch]
permissions: contents: write

jobs:
  cleanup_and_reset:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deep Cleanup of Injected Features
        run: |
          # 1. Рӯйхати ҳамаи ID-ҳое, ки бояд нест шаванд
          IDS="WelcomeBellTitle WelcomeBellDesc WelcomeChannelSuggest WelcomeBellTitle_Reentry WelcomeBellDesc_Reentry ExitDialogTitle ExitDialogDesc TajgramBellCurrencyTitle TajgramBellCurrencyStatus VipSettingsMenuTitle SecretSupportButtonLabel AskAQuestion AskAQuestion_Owner TajgramFolkModeSwitch TajgramFolkModeDesc Folk_Settings Folk_Security Folk_InviteFriends VipSettingsTitle VipSupportBot LikeButton DislikeButton VoiceSelection VoiceIcon_Girl VoiceIcon_Boy"
          
          # 2. Нест кардани ID-ҳо аз ҳамаи файлҳои strings.xml
          find . -type f -name "strings.xml" | while read -r file; do
            echo "Cleaning: $file"
            for id in $IDS; do
              # Ин сатр ҳамаи сатрҳоеро, ки ин ID-ро доранд, нест мекунад
              sed -i "/name=\"$id\"/d" "$file"
            done
            # Тоза кардани сатрҳои холии зиёдатӣ, агар монда бошанд
            sed -i '/^$/d' "$file"
          done

      - name: Commit and Push Cleanup
        run: |
          git config --global user.name "Saidjun Chief Developer"
          git config --global user.email "actions@github.com"
          git add .
          # Агар тағйирот бошад, онро сабт мекунем
          if ! git diff-index --quiet HEAD; then
            git commit -m "Cleanup: Removed all injected features and reset strings."
            git push
            echo "Cleanup completed and pushed."
          else
            echo "No changes needed, repository is clean."
          fi
