          RU_DATA='    <string name="VipSettingsTitle">VIP настройки</string>
              <string name="VipSupportBot">Прямая поддержка</string>
              <string name="LikeButton">👍 Нравится</string>
              <string name="DislikeButton">👎 Не нравится</string>
              <string name="VoiceSelection">Выбор голоса 🔊</string>
              <string name="VoiceIcon_Girl">👩 Голос девушки</string>
              <string name="VoiceIcon_Boy">👨 Голос парня</string>
              <string name="WelcomeBellTitle">Добро пожаловать!</string>
              <string name="WelcomeBellDesc">Спасибо что выбрали нас.</string>
              <string name="WelcomeChannelSuggest">Пожалуйста, подпишитесь на канал.</string>
