name: 2-Second Force Setup All SDK and System Environments

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix_paths:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Your Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Force Lock System Files and NDK Paths
        run: |
          git config --global user.name "Saidjun Chief Developer"
          git config --global user.email "saidjun@tajgram.messenger"
          
          # 1. ТАЪМИРИ buildSrc (ПРОЧ): СОХТАНИ ФАЙЛИ local.properties ТАВАССУТИ ECHO
          mkdir -p buildSrc
          echo "sdk.dir=/usr/local/lib/android/sdk" > buildSrc/local.properties
          echo "ndk.dir=/usr/local/lib/android/sdk/ndk/25.2.9519653" >> buildSrc/local.properties
          
          # 2. ТАЪМИРИ ПАПКАИ АСОСИИ ЛОИҲА
          echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties
          echo "ndk.dir=/usr/local/lib/android/sdk/ndk/25.2.9519653" >> local.properties
          
          # 3. ТАЪМИРИ ПАПКАИ TMessagesProj
          if [ -d "TMessagesProj" ]; then
            echo "sdk.dir=/usr/local/lib/android/sdk" > TMessagesProj/local.properties
            echo "ndk.dir=/usr/local/lib/android/sdk/ndk/25.2.9519653" >> TMessagesProj/local.properties
          fi
          
          # 4. САБТИ ҚАТЪӢ ВА АВТОМАТӢ ДАР СAЙТ БЕ ХАТОГӢ
          git add .
          git commit -m "⚙️ SYSTEM ENVIRONMENT FIXED: buildSrc and local properties for Android SDK locked with echo!" || exit 0
          git push origin HEAD:${{ github.ref_name }} --force
