name: 🎨 AUTOMATIC MAIN REPO ICON OVERWRITER

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  overwrite_logos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Your Code Fresh
        uses: actions/checkout@v4

      - name: Set up Python with Image Engine
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install High Quality Image Library
        run: pip install Pillow

      - name: Hard Purge All Webp Duplicates and Lock Single PNG Structure
        run: |
          git config --global user.name "Saidjun Chief Developer"
          git config --global user.email "saidjun@tajgram.messenger"
          
          # 1. ТАЪМИРИ ХАТOИ ЯКУМ ДАР JAVA (PUBLIC КАРДАНИ КЛАСС)
          python3 -c "
          import os
          file_path = 'TMessagesProj/src/main/java/org/telegram/messenger/TelegramConnectionService.java'
          if os.path.exists(file_path):
              with open(file_path, 'r', encoding='utf-8') as f:
                  code = f.read()
              if 'class TelegramConnectionService' in code and 'public class' not in code:
                  code = code.replace('class TelegramConnectionService', 'public class TelegramConnectionService')
                  with open(file_path, 'w', encoding='utf-8') as f:
                      f.write(code)
                  print('✅ TelegramConnectionService public шуд!')
          "
          
          # 2. ФАРМОНИ ҚАТЪӢ: НЕСТ КАРДАНИ ТАМОМИ ФАЙЛҲОИ ТАҚРОРИИ WEBP АЗ РЕШАШ
          git rm -f TMessagesProj/src/main/res/drawable-*/notification.webp || true
          git rm -f TMessagesProj/src/main/res/drawable-*/status_icon.webp || true
          git rm -f TMessagesProj/src/main/res/drawable-*/tajgram_logo.webp || true
          git rm -f TMessagesProj/src/main/res/drawable-*/tajgram_logo_1.webp || true
          git rm -f TMessagesProj/src/main/res/drawable-*/tajgram_logo_2.webp || true
          git rm -f TMessagesProj/src/main/res/drawable-*/menu_invite_tajgram.webp || true
          
          # 3. СОХТАНИ ТАНҲО ФOРМAТИ ТОЗАИ PNG БАРОИ ИНТЕРФЕЙС
          python3 -c "
          import os
          from PIL import Image
          
          res_dir = 'TMessagesProj/src/main/res'
          draw_folders = ['drawable-mdpi', 'drawable-hdpi', 'drawable-xhdpi', 'drawable-xxhdpi', 'drawable-xxxhdpi']
          base_sizes = {'mdpi': 48, 'hdpi': 72, 'xhdpi': 96, 'xxhdpi': 144, 'xxxhdpi': 192}
          
          main_img_path = f'{res_dir}/ic_launcher.png'
          if os.path.exists(main_img_path):
              img = Image.open(main_img_path).convert('RGBA')
              
              for folder in draw_folders:
                  density = folder.replace('drawable-', '')
                  b_size = base_sizes[density]
                  target_dir = f'{res_dir}/{folder}'
                  os.makedirs(target_dir, exist_ok=True)
                  
                  icon_square = img.resize((b_size, b_size), Image.Resampling.LANCZOS)
                  
                  # САБТИ ТАНҲО ФOРМAТИ PNG (ДИГАР ЯГОН WEBP ДУБЛИКАТ НАМЕШАВАД!)
                  icon_square.save(f'{target_dir}/tajgram_logo.png', 'PNG', quality=100)
                  icon_square.save(f'{target_dir}/tajgram_logo_1.png', 'PNG', quality=100)
                  icon_square.save(f'{target_dir}/tajgram_logo_2.png', 'PNG', quality=100)
                  icon_square.save(f'{target_dir}/menu_invite_tajgram.png', 'PNG', quality=100)
                  
                  # Ислоҳи файлҳои огоҳиномаҳо бо формати софи PNG
                  n_size = int(b_size * 0.5)
                  icon_notif = img.resize((n_size, n_size), Image.Resampling.LANCZOS)
                  icon_notif.save(f'{target_dir}/notification.png', 'PNG', quality=100)
                  icon_notif.save(f'{target_dir}/status_icon.png', 'PNG', quality=100)
                  
          print('✅ ТАМОМИ ДУБЛИКАТҲОИ WEBP ТОЗА ШУДАНД ВА ТАНҲО PNG МОНД!')
          "
          
          # Сабти автоматӣ ба лоиҳа
          git add TMessagesProj/
          git commit -m "🎨 FIX: Purged all duplicate webp assets and locked clean single PNG format!" || exit 0
          git push origin HEAD:${{ github.ref_name }} --force
