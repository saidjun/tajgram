name: 🎨 AUTOMATIC MAIN REPO ICON OVERWRITER

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  overwrite_logos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Your Code Fresh
        uses: actions/checkout@v4

      - name: Set up Python with Image Engine
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install High Quality Image Library
        run: pip install Pillow

      - name: Pure Factory Code Sync and Target Asset Replacement
        run: |
          git config --global user.name "Saidjun Chief Developer"
          git config --global user.email "saidjun@tajgram.messenger"
          
          # 1. СИНХРОНИЗАЦИЯИ КOД: БAРГAРДOНИДAНИ НOМҲO БA ЗAВOДИИ АСЛӢ КИ БO РAСМҲO ЯКХEЛ ШAВAНД
          python3 -c "
          import os
          
          def fix_file(file_path):
              if os.path.exists(file_path):
                  with open(file_path, 'r', encoding='utf-8') as f:
                      code = f.read()
                  
                  # Номи кодро аниқ ба номи заводии расмҳо якхела мекунем!
                  code = code.replace('menu_invite_tajgram', 'msg_invite')
                  code = code.replace('tajgram_logo_1', 'home_logo')
                  code = code.replace('tajgram_logo_2', 'msg_panel')
                  code = code.replace('tajgram_logo', 'ic_launcher')
                  
                  with open(file_path, 'w', encoding='utf-8') as f:
                      f.write(code)
                  print(f'✅ Коди {file_path} бо расмҳо 100% якхелаи заводӣ шуд!')
          
          fix_file('TMessagesProj/src/main/java/org/telegram/ui/ChatActivity.java')
          fix_file('TMessagesProj/src/main/java/org/telegram/ui/DialogsActivity.java')
          fix_file('TMessagesProj/src/main/java/org/telegram/ui/VoipFeedbackActivity.java')
          fix_file('TMessagesProj/src/main/java/org/telegram/ui/IntroActivity.java')
          "
          
          # 2. СУҒУРТА: ТOЗA КAРДAНИ ТAМOМИ ДУБЛИКAТҲOИ WEBP БАРОИ ПЕШГИРИИ ХАТOИ ГРАДЛЕ
          git rm -f TMessagesProj/src/main/res/drawable-*/notification.webp || true
          git rm -f TMessagesProj/src/main/res/drawable-*/status_icon.webp || true
          git rm -f TMessagesProj/src/main/res/drawable-*/msg_invite.webp || true
          git rm -f TMessagesProj/src/main/res/drawable-*/msg_panel.webp || true
          git rm -f TMessagesProj/src/main/res/drawable-*/home_logo.webp || true
          git rm -f TMessagesProj/src/main/res/drawable-*/ic_launcher_inplace.webp || true
          
          # 3. ЗAМEНAИ МУТЛAҚ: СAБТИ РAСМИ ТAҶГРAМ БO НOМҲOИ ЗAВOДӢ ДАР ПАПКАҲО
          python3 -c "
          import os
          from PIL import Image
          
          res_dir = 'TMessagesProj/src/main/res'
          draw_folders = ['drawable-mdpi', 'drawable-hdpi', 'drawable-xhdpi', 'drawable-xxhdpi', 'drawable-xxxhdpi']
          base_sizes = {'mdpi': 48, 'hdpi': 72, 'xhdpi': 96, 'xxhdpi': 144, 'xxxhdpi': 192}
          
          main_img_path = f'{res_dir}/ic_launcher.png'
          if os.path.exists(main_img_path):
              img = Image.open(main_img_path).convert('RGBA')
              
              for folder in draw_folders:
                  density = folder.replace('drawable-', '')
                  b_size = base_sizes[density]
                  target_dir = f'{res_dir}/{folder}'
                  os.makedirs(target_dir, exist_ok=True)
                  
                  icon_square = img.resize((b_size, b_size), Image.Resampling.LANCZOS)
                  
                  # ФАРМОНИ ҚАТЪИИ ТУ: ОН РАСМҲОИ ЗАПАС ИСТОДААСТ, ТАНҲО ИН 4 ТАРО ЗАМЕНА МЕКУНЕМ!
                  icon_square.save(f'{target_dir}/msg_invite.png', 'PNG', quality=100)
                  icon_square.save(f'{target_dir}/home_logo.png', 'PNG', quality=100)
                  icon_square.save(f'{target_dir}/ic_launcher_inplace.png', 'PNG', quality=100)
                  icon_square.save(f'{target_dir}/msg_panel.png', 'PNG', quality=100)
                  
                  # Сабти файлҳои хурди уведомление бо бренди ту
                  n_size = int(b_size * 0.5)
                  icon_notif = img.resize((n_size, n_size), Image.Resampling.LANCZOS)
                  icon_notif.save(f'{target_dir}/notification.png', 'PNG', quality=100)
                  icon_notif.save(f'{target_dir}/status_icon.png', 'PNG', quality=100)
                  
          print('✅ ЗАМЕНА ИҶРО ШУД: КОД ВА РАСМҲОИ ЗАВОДӢ 100% БО БРЕНДИ ТУ ЯКХЕЛА ШУДАНД!')
          "
          
          # Сабти автоматӣ ва бехатар ба Гитҳуб
          git add TMessagesProj/
          git commit -m "🎨 FIX: Synced factory names with images and completed target asset replacement successfully!" || exit 0
          git push origin HEAD:${{ github.ref_name }} --force
