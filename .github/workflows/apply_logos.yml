name: 🎨 AUTOMATIC MAIN REPO ICON OVERWRITER

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  overwrite_logos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Your Code Fresh
        uses: actions/checkout@v4

      - name: Set up Python with Image Engine
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install High Quality Image Library
        run: pip install Pillow

      - name: Process, Resize and Overwrite All Hidden Core Icons Safely
        run: |
          git config --global user.name "Saidjun Chief Developer"
          git config --global user.email "saidjun@tajgram.messenger"
          
          python3 -c "
          import os
          from PIL import Image, ImageDraw
          
          source_img = 'TMessagesProj/src/main/res/tajgram_logo_source.png'
          
          if not os.path.exists(source_img):
              print('❌ ФАЙЛИ РАСМИ АСЛӢ ДАР ПАПКАИ RES ЁФТ НАШУД!')
              exit(1)
              
          img = Image.open(source_img).convert('RGBA')
          
          # Рӯйхати 5 папкаи заводии аслии Телеграм
          folders = ['drawable-mdpi', 'drawable-hdpi', 'drawable-xhdpi', 'drawable-xxhdpi', 'drawable-xxxhdpi']
          
          # Таносуби андозаҳо барои ҳар як папка
          base_sizes = {
              'drawable-mdpi': 48,
              'drawable-hdpi': 72,
              'drawable-xhdpi': 96,
              'drawable-xxhdpi': 144,
              'drawable-xxxhdpi': 192
          }
          
          for folder in folders:
              if folder not in base_sizes:
                  continue
              b_size = base_sizes[folder]
              target_dir = f'TMessagesProj/src/main/res/{folder}'
              os.makedirs(target_dir, exist_ok=True)
              
              # КОРӢ АСЛӢ: Омода кардани расми чоркунҷа бо сифати баланд (LANCZOS)
              icon_square = img.resize((b_size, b_size), Image.Resampling.LANCZOS)
              
              # 1. ИВАЗ КАРДАНИ ИКОНКАҲОИ МАХФИИ ИНТИХОБИ ТУ (БЕ ДАСТ РAСӢ БА ic_launcher.png)
              icon_square.save(f'{target_dir}/ic_launcher_dr.webp', 'WEBP', quality=100)
              icon_square.save(f'{target_dir}/ic_launcher_monochrome.png', 'PNG', quality=100)
              
              # 2. ТАЪМИРИ ИКОНКАҲОИ ОГОҲӢ ВА ЗАНГҲО (status_icon ва notification)
              n_size = int(b_size * 0.5) # Андозаи хурд барои огоҳиҳо
              icon_notif = img.resize((n_size, n_size), Image.Resampling.LANCZOS)
              icon_notif.save(f'{target_dir}/status_icon.png', 'PNG', quality=100)
              icon_notif.save(f'{target_dir}/notification.png', 'PNG', quality=100)
              
              # 3. ТАЪМИРИ ЛОГОТИПИ САҲИФАИ ВУРУД (ic_splasht / ic_splash)
              s_size = int(b_size * 2.1) # Андозаи калон барои Сплеш
              icon_splash = img.resize((s_size, s_size), Image.Resampling.LANCZOS)
              icon_splash.save(f'{target_dir}/ic_splasht.png', 'PNG', quality=100)
              icon_splash.save(f'{target_dir}/ic_splash.png', 'PNG', quality=100)
              
              print(f'✅ Гӯшаҳои махфии папкаи {folder} 100% муҳофизат ва ислоҳ шуданд!')
          "
          
          # Сабти автоматӣ ба лоиҳа (БЕ ДАСТ РAСӢ БА ФАЙЛҲОИ ic_launcher.png ТУ)
          git add TMessagesProj/src/main/res/drawable-*/ic_launcher_dr.webp
          git add TMessagesProj/src/main/res/drawable-*/ic_launcher_monochrome.png
          git add TMessagesProj/src/main/res/drawable-*/status_icon.png
          git add TMessagesProj/src/main/res/drawable-*/notification.png
          git add TMessagesProj/src/main/res/drawable-*/ic_splash*.png
          git commit -m "🎨 BRANDING COMPLETED: All hidden and root Telegram logos overwritten with Tajgram VIP Logo successfully!" || exit 0
          git push origin HEAD:${{ github.ref_name }} --force
