name: Super Fix and Build

on:
  workflow_dispatch:

jobs:
  fix-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Hard Fix XML Quotes and Syntax
        run: |
          echo "--- Оғози санҷиш ва ислоҳи файлҳо ---"
          find . -name "strings.xml" | while read file; do
            # Тафтиш мекунем, ки оё дар файл аломати & ё хатои % ҳаст
            if grep -q "&" "$file" || grep -q "%" "$file"; then
              echo "🛠 Тағйирот дар файли: $file"
              # Ислоҳ мекунем ва тағйиротро нишон медиҳем
              sed -i 's/&/&amp;/g' "$file"
              sed -i -E 's/([^%])%([^0-9a-zA-Z%])/\1%%\2/g' "$file"
              echo "✅ Файли $file бомуваффақият ислоҳ шуд."
            fi
          done
          echo "--- Ислоҳот ба поён расид ---"

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
