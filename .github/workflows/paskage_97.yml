name: Deep Repository Audit

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Comprehensive Code Audit
        run: |
          echo "🔎 Оғози кофтани репозитория (А то Я)..."
          # 1. Ҷустуҷӯи ҳамаи хатогиҳои XML
          echo "--- XML ERRORS ---"
          # Истифодаи perl, чунки xmllint на ҳама вақт дар муҳити GitHub насб аст
          find . -name "*.xml" -exec perl -e 'use XML::Parser; eval { XML::Parser->new(Style=>"Debug")->parsefile($ARGV[0]) }; print "$ARGV[0]: $@\n" if $@' {} \; 2>&1 | grep "error" || echo "XML тоза аст."
          
          # 2. Ҷустуҷӯи калимаҳои Telegram, ки бояд Tajgram шаванд
          echo "--- BRANDING MAPPINGS ---"
          # Ҷустуҷӯи калимаҳо дар файлҳои коди асосӣ
          grep -rnE "Telegram|telegram" . --exclude-dir=.git --exclude-dir=build --exclude-dir=.gradle | head -n 50
          
          # 3. Санҷиши файлҳои нодуруст ё вайроншуда
          echo "--- INTEGRITY CHECK ---"
          # Пайдо кардани файлҳои холие, ки метавонанд боиси билд нашаванд
          find . -type f -size 0 -not -path "*/.*"
          
          echo "--- C++ / JNI FILES CHECK ---"
          find . -name "*.cpp" -o -name "*.h" -o -name "*.c" | wc -l
          
          echo "✅ Аудит ба поён расид."
