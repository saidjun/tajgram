name: Find All XML Errors

on:
  workflow_dispatch:

jobs:
  check-errors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan all strings.xml files for syntax errors
        run: |
          echo "🔎 Оғози ҷустуҷӯи хатогиҳо дар файлҳои XML..."
          find . -name "strings.xml" | while read file; do
            # Санҷиши синтаксис бо xmllint
            error=$(xmllint --noout "$file" 2>&1)
            if [ $? -ne 0 ]; then
              echo "❌ ХАТО дар файл: $file"
              echo "$error"
              echo "-----------------------------------"
            fi
          done
          echo "✅ Санҷиш анҷом ёфт."
