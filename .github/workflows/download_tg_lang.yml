name: Tajgram Intelligent Language Auto-Translator
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  translate_lang:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Tajgram Repository
      uses: actions/checkout@v4
      with:
        clean: false
        ref: master
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Translation Dependencies
      run: |
        pip install deep-translator lxml

    - name: Run Advanced Translation Engine with Grammar Matrix
      run: |
        import os
        import re
        from deep_translator import GoogleTranslator
        import time

        source_file = 'TMessagesProj/src/main/res/values-ru/strings.xml'
        target_dir = 'TMessagesProj/src/main/res/values-tg'
        target_file = os.path.join(target_dir, 'strings.xml')

        if not os.path.exists(target_dir):
            os.makedirs(target_dir)

        translator_ru = GoogleTranslator(source='ru', target='tg')
        translator_en = GoogleTranslator(source='en', target='tg')

        # ЛУҒАТИ МАРКАЗИИ ГРАММАТИКАИ ТОҶИКӢ БАРОИ ИСЛОҲИ ХАТОГИҲОИ РОБОТ
        grammar_dictionary = {
            "ваш номер телефон": "Рақами телефони шумо",
            "телефон шумо": "телефони шумо",
            "номер ваш": "рақами шумо",
            "паём фиристода шуд": "Паём фиристода шуд",
            "сообщение отправлено": "Паём фиристода шуд",
            "код подтверждения": "Коди тасдиқ",
            "введите код": "Кодро ворид кунед",
            "ошибка соединения": "Хатогии пайвастшавӣ",
            "настройки": "Танзимот",
            "поддержка": "Дастгирӣ",
            "кошелек": "Ҳамён",
            "баланс": "Тавозун"
        }

        print("=== 🤖 ОҒОЗИ ТАРҶУМАИ ПУРРА БО ФИЛТРИ ГРАММАТИКАИ ТОҶИКӢ ===")
        
        output_lines = []
        with open(source_file, 'r', encoding='utf-8') as f:
            lines = f.readlines()

        count = 0
        for line in lines:
            match = re.search(r'>(.*)</string>', line)
            if match:
                raw_text = match.group(1)
                
                if re.search(r'%[0-9]+\$[a-zA-Z]|%[a-zA-Z]|\\[nt]', raw_text) or not raw_text.strip():
                    output_lines.append(line)
                    continue
                
                try:
                    if any(c in 'аеёжзийклмнопрстуфхцчшщъыьэюя' for c in raw_text.lower()):
                        translated = translator_ru.translate(raw_text)
                    else:
                        translated = translator_en.translate(raw_text)
                    
                    # Иваз кардани калимаҳои хато ба фразаҳои дурусти грамматикаи тоҷикӣ
                    for wrong_phrase, right_phrase in grammar_dictionary.items():
                        if wrong_phrase in translated.lower():
                            # Мутобиқсозии хушманди регистр (Капитализация)
                            if translated[0].isupper():
                                translated = re.sub(wrong_phrase, right_phrase, translated, flags=re.IGNORECASE)
                            else:
                                translated = re.sub(wrong_phrase, right_phrase.lower(), translated, flags=re.IGNORECASE)
                    
                    if "Telegram" in translated: translated = translated.replace("Telegram", "Tajgram")
                    if "Телеграм" in translated: translated = translated.replace("Телеграм", "Таҷграм")
                    
                    new_line = line.replace(raw_text, translated)
                    output_lines.append(new_line)
                except Exception:
                    output_lines.append(line)
            else:
                output_lines.append(line)
                
            count += 1
            if count % 300 == 0:
                print(f"📦 Прогресси амн: {count} сатр бо грамматика ҳамоҳанг шуд...")
                time.sleep(0.3)

        header_comment = "<!-- 👑 TAJGRAM VIP OFFICIAL TAJIK LANGUAGE SYSTEM - DEVELOPED BY CHIEF DEVELOPER SAIDJUN (2025-2030) -->\n"
        with open(target_file, 'w', encoding='utf-8') as f:
            f.write(header_comment)
            f.writelines(output_lines)
            
        print("=== 🎉 МУВАФФАҚИЯТ: КУЛЛИ ФАЙЛ БО ГРАММАТИКАИ ТОЗА ПУР ШУД! ===")
      shell: python

    - name: Commit and Secure Push Tajgram Language
      run: |
        git config --global user.name "Saidjun Chief Developer"
        git config --global user.email "saidjun@tajgram.messenger"
        git add TMessagesProj/src/main/res/values-tg/strings.xml
        git commit -m "👑 TAJGRAM LANGUAGE: Fully unlocked and translated with strict grammar checks" || echo "No changes"
        git push origin HEAD:master --force
