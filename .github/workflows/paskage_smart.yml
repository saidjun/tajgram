name: Smart Tajgram Fixer

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  smart_fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Apply Smart Branding
        run: |
          git config --global user.name "Saidjun Bot"
          git config --global user.email "bot@tajgram.messenger"

          echo "--- 1. Fixing XML errors (Safe Mode) ---"
          find . -name "strings.xml" -exec sed -i 's/&/&amp;/g' {} \;
          find . -name "strings.xml" -exec sed -i 's/"/\\"/g' {} \;

          echo "--- 2. Branding (Visual & AppID only) ---"
          # Танҳо номи намоёнро дар файлҳо иваз мекунем
          find . -name "strings.xml" -exec sed -i 's/Telegram/Tajgram VIP/g' {} \;
          
          # Иваз кардани ApplicationID дар файлҳои Gradle
          find . -name "build.gradle" -exec sed -i 's/org.telegram.messenger/org.tajgram.messenger/g' {} \;
          
          echo "--- 3. Commit Changes ---"
          git add .
          git commit -m "🚀 SMART FIX: Branding updated, XML cleaned, Core preserved" || echo "No changes"
          git push origin HEAD:master --force
          
          echo "✅ Аудит ва ислоҳ бомуваффақият анҷом ёфт."
