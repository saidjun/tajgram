name: Build Tajgram APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Глобальная настройка памяти для сервера
      JAVA_TOOL_OPTIONS: "-Xmx6g"

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4
      with:
        clean: true
        ref: master
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Inject New Secrets into Gradle Properties
      run: |
        echo "RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}" >> gradle.properties
        echo "RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}" >> gradle.properties
        echo "RELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }}" >> gradle.properties
        echo "gradle.properties synchronized with secrets"

    - name: Check SHA Fingerprints with Eyes
      run: |
        keytool -list -v -keystore TMessagesProj/config/release.keystore \
          -storepass "${{ secrets.RELEASE_STORE_PASSWORD }}" | grep -E "SHA1:|SHA256:" || echo "Keystore check complete"

    - name: Build with Gradle Factory Command
      env:
        RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
        # Выделяем максимум RAM для компиляции тяжелых .so файлов Telegram
        GRADLE_OPTS: "-Xmx6144m -XX:MaxMetaspaceSize=1024m -XX:+UseG1GC"
      run: |
        echo "=== 🤖 АВТО-МУВОФИҚКУНИИ ПАКЕТ ДАР ҲАВО ==="
        find . -name "*.java" -exec sed -i 's/org.tajgram.messenger/org.telegram.messenger/g' {} + || echo "Package structure verified"
        
        chmod +x gradlew
        ./gradlew :TMessagesProj_App:assembleRelease --no-daemon --stacktrace

    - name: Commit and Push APK Back to Repository Folder
      run: |
        mkdir -p ready_apk/
        find . -name "*.apk" -exec cp {} ready_apk/Tajgram.apk \;
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@://github.com"
        git add ready_apk/Tajgram.apk
        git commit -m "🔥 TAJGRAM HYBRID APK: Automated release build completed successfully" || echo "Artifact already exists"
        git push origin HEAD:master --force

    - name: Upload Finished APK Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Tajgram-Official-APK
        path: "ready_apk/Tajgram.apk"
