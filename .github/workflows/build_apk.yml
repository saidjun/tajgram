name: Build Tajgram APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Зиреҳи хотира ва гази протсессори сервер
      JAVA_TOOL_OPTIONS: "-Xmx6g -XX:+UseG1GC"

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4
      with:
        clean: false # Ба ҳеҷ чиз даст намезанад, файлҳоро нест намекунад
        ref: master
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Inject New Secrets into Gradle Properties
      run: |
        echo "RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}" >> gradle.properties
        echo "RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}" >> gradle.properties
        echo "RELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }}" >> gradle.properties

    - name: Build with Gradle Factory Command
      env:
        RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
        # МАКСИМУМ ГАЗ ВА ЗИЁД КАРДАНИ ТОҚАТИ СЕРВЕР (MAX SPEED & TIMEOUT FIX)
        GRADLE_OPTS: "-Xmx6144m -XX:MaxMetaspaceSize=2048m -XX:+UseG1GC -Dorg.gradle.parallel=true -Dorg.gradle.configureondemand=true"
      run: |
        echo "=== 🚀 ГАЗИ ПУРРА: БИЛДИ ТЕЗКОР ВА БОҚУВВАТИ ТАҶГРАМ ==="
        
        chmod +x gradlew
        
        # Сборка бо тезкории максималии ядроҳо ва нигоҳдории кэш
        ./gradlew :TMessagesProj_App:assembleRelease --no-daemon --parallel --configure-on-demand --stacktrace

    - name: Commit and Push APK Back to Repository Folder
      run: |
        mkdir -p ready_apk/
        find . -name "*.apk" -exec cp {} ready_apk/Tajgram.apk \;
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@://github.com"
        git add ready_apk/Tajgram.apk
        git commit -m "🔥 TAJGRAM HYBRID APK: Fast release build completed" || echo "No changes"
        git push origin HEAD:master --force

    - name: Upload Finished APK Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Tajgram-Official-APK
        path: "ready_apk/Tajgram.apk"
