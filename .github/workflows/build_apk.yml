name: Build Tajgram APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4
      with:
        clean: true

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    # ИСЛОҲИ МУХОЛИФАТ: Иваз кардани автоматии паролҳои заводии даруни файл бо калидҳои махфии ту
    - name: Inject New Secrets into Gradle Properties
      run: |
        sed -i 's/RELEASE_KEY_ALIAS=.*/RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}/g' gradle.properties
        sed -i 's/RELEASE_KEY_PASSWORD=.*/RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}/g' gradle.properties
        sed -i 's/RELEASE_STORE_PASSWORD=.*/RELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }}/g' gradle.properties
        echo "✅ Паролҳои заводии файл бо Secrets комилан сингхронӣ шуданд!"

    # Сохтани автоматӣ мустақим аз рӯи Secrets
    - name: Generate Release Keystore Automatically
      run: |
        mkdir -p TMessagesProj/config/
        rm -f TMessagesProj/config/release.keystore || true
        keytool -genkeypair -v -keystore TMessagesProj/config/release.keystore \
          -alias "${{ secrets.RELEASE_KEY_ALIAS }}" \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass "${{ secrets.RELEASE_STORE_PASSWORD }}" \
          -keypass "${{ secrets.RELEASE_KEY_PASSWORD }}" \
          -dname "CN=Tajgram, OU=VIP, O=Messenger, L=Dushanbe, S=Tajikistan, C=TJ"

    # Намоиши SHA-1 ва SHA-256 дар логҳо бо чашми худ
    - name: Check SHA Fingerprints with Eyes
      run: |
        echo "=== САНҶИШИ ПАСПОРТИ РАҚАМИИ БАРНОМА ==="
        keytool -list -v -keystore TMessagesProj/config/release.keystore \
          -storepass "${{ secrets.RELEASE_STORE_PASSWORD }}" | grep -E "SHA1:|SHA256:"
        echo "========================================="

    - name: Build with Gradle Factory Command
      env:
        RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
      run: |
        chmod +x gradlew
        ./gradlew :TMessagesProj_App:assembleRelease --stacktrace

    - name: Upload Finished APK Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Tajgram-Official-APK
        path: TMessagesProj_App/build/outputs/apk/release/*.apk
