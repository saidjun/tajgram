name: Build and Package Tajgram VIP APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc

      - name: Checkout Your Code Fresh
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android NDK Engine
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          local-properties: true

      - name: Check and Lock Lifetime SHA Passport Keys (НАЗОРАТИ ҚАТЪӢ)
        run: |
          git config --global user.name "Saidjun Chief Developer"
          git config --global user.email "saidjun@tajgram.messenger"
          
          # НАЗОРАТ: Агар калид аллакай бошад, онро АСЛО аз нав намесозад ва алиш намекунем!
          if [ ! -f "tajgram_lifetime.keystore" ]; then
            echo "Калид ёфт нашуд. Сохтани Паспорти ҳамешагии умурбод..."
            keytool -genkey -v -keystore tajgram_lifetime.keystore -storepass tajgram2026 -alias tajgram_key -keypass tajgram2026 -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Tajgram VIP,O=Saidjun,C=TJ" || true
            git add tajgram_lifetime.keystore
            git commit -m "🔑 КАЛИД: Паспорти ҳамешагӣ дар система қулф шуд" || true
            git push origin HEAD:${{ github.ref_name }} --force || true
          else
            echo "✅ НАЗОРАТ: Калиди умурбод аллакай ҳаст! Онро алиш намекунем."
          fi
          
          # ҲАР БОР ДАР ЛОГҲО КАЛИДҲОИ ТУРО РАВШАН ЧОП МЕДЕҲАД (ТО ДИЛАТ ПУРРА ОРОМ БОШАД)
          echo "--- ПАСПОРТИ БАРНОМАИ ТУ (SHA-1 ва SHA-256) ДАР ЗЕР АСТ ---"
          keytool -list -v -keystore tajgram_lifetime.keystore -alias tajgram_key -storepass tajgram2026 | grep -E "SHA1:|SHA256:" || true
          echo "--------------------------------------------------------"
          
          # Нусхабардории калид ба папкаи дохилии сервер барои сохтмони Gradle
          mkdir -p ~/.android
          cp tajgram_lifetime.keystore ~/.android/debug.keystore

      - name: Build Android APK Pure Engine
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx6g -Dorg.gradle.parallel=true -Dorg.gradle.configureondemand=true"
        run: |
          chmod +x gradlew
          # Пухтани барнома мустақиман аз рӯи файлҳои сохтаи худат
          ./gradlew assembleDebug --no-daemon --stacktrace -x test -x lint -x check
          
      - name: Upload Finished APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Tajgram-VIP-Debug-APK
          path: "TMessagesProj/build/outputs/apk/**/*.apk"
