name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Link GitHub Secrets and Recreate Config Folder
        env:
          ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
          STORE_PASS: ${{ secrets.STORE_PASSWORD }}
        run: |
          # 1. СOХТAНИ ПAПКAИ ЗАВОДИИ CONFIG АЗ НАВ
          mkdir -p TMessagesProj/config/
          rm -f TMessagesProj/config/release.keystore || true
          
          # 2. РОБОТ АВТОМАТӢ КАЛИДИ ОЗМОИШИРО ДАР ҶОИ АНИҚИ CONFIG МЕСОЗАД
          keytool -genkey -v -keystore TMessagesProj/config/release.keystore \
            -alias "$ALIAS" -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$STORE_PASS" -keypass "$KEY_PASS" -dname "CN=Tajgram, OU=VIP, O=Messenger, L=Dushanbe, S=Tajikistan, C=TJ"
          
          # 3. САБТИ ФАЙЛИ ТАНЗИМОТИ ПАРОЛҲО
          cat <<EOF > TMessagesProj/config/keystore.properties
          keyAlias=$ALIAS
          keyPassword=$KEY_PASS
          storePassword=$STORE_PASS
          EOF
          echo "✅ Калиди расмии имзо бо Сейф 100% ҳамоҳанг шуд!"

      - name: Build with Gradle Factory Command
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Factory-Telegram-APK
          path: "TMessagesProj/build/outputs/apk/debug/*.apk"
