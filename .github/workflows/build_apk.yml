name: Build Tajgram APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JAVA_TOOL_OPTIONS: "-Xmx6g -XX:+UseG1GC"

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4
      with:
        clean: true
        ref: master
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    # 🛠 ИСЛОҲИ ЗАБОНИ ТОҶИКӢ (ҲАМОНЕ, КИ МО ДУРУСТ КАРДЕМ)
    - name: Apply Tajik Language Fixes
      run: |
        LANG_FILE="TMessagesProj/src/main/res/values-tg/strings.xml"
        [ ! -f "$LANG_FILE" ] && LANG_FILE="TMessagesProj_App/src/main/res/values-tg/strings.xml"
        
        if [ -f "$LANG_FILE" ]; then
          echo "🚀 Ислоҳи синтаксиси забони тоҷикӣ..."
          # Ислоҳи аломати фоиз
          sed -i -E 's/([^%])%([^0-9a-zA-Z%])/\1%%\2/g' "$LANG_FILE"
          sed -i -E 's/([^%])%$/\1%%/g' "$LANG_FILE"
          # Ислоҳи аломати & барои XML
          sed -i 's/&/&amp;/g' "$LANG_FILE"
          echo "Забони тоҷикӣ бомуваффақият ислоҳ шуд!"
        fi

    - name: Build Tajgram APK
      env:
        RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
        GRADLE_OPTS: "-Xmx6144m -Dorg.gradle.parallel=true"
      run: |
        echo "=== 🚀 БИЛДИ УСТУВОРИ TAJGRAM ==="
        chmod +x gradlew
        ./gradlew clean assembleRelease --no-daemon --parallel --stacktrace

    - name: Move and Push APK
      run: |
        mkdir -p ready_apk/
        find . -name "*release.apk" -exec cp {} ready_apk/Tajgram.apk \;
        
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add ready_apk/Tajgram.apk
        git commit -m "🔥 TAJGRAM: Build completed with Tajik language support" || echo "No changes"
        git push origin HEAD:master --force

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Tajgram-Official-APK
        path: ready_apk/Tajgram.apk
