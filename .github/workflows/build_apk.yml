name: Build Tajgram APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Зиреҳи хотираи сервер ва ҳифзи билд
      JAVA_TOOL_OPTIONS: "-Xmx6g -XX:+UseG1GC"

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4
      with:
        clean: false
        ref: master
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Inject New Secrets into Gradle Properties
      run: |
        echo "RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}" >> gradle.properties
        echo "RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}" >> gradle.properties
        echo "RELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }}" >> gradle.properties

    # 🔐 БАХШИ НАЗОРАТИ САНҶИШИ SHA-256 МУСТАҚИМ ДАР ҶОИ АСЛИАШ (БЕ ТАҒЙИР)
    - name: Check SHA Fingerprints with Eyes
      run: |
        keytool -list -v -keystore TMessagesProj/config/release.keystore \
          -storepass "${{ secrets.RELEASE_STORE_PASSWORD }}" | grep -E "SHA1:|SHA256:" || echo "Keystore check complete"

    # 🛠 ИСЛОҲИ МАРКАЗИИ ЗАБОН, ВЕРСИЯ ВА СИНХРОНИЗАТСИЯИ ЛАЗЕРИИ ПАКЕТҲОИ ТАҶГРАМ
    - name: Auto-Fix Tajik Language Syntax & Version
      run: |
        LANG_FILE="TMessagesProj_App/src/main/res/values-tg/strings.xml"
        if [ -f "$LANG_FILE" ]; then
          echo "========================================================"
          echo "🚀 Ислоҳи автоматии аломатҳои фоиз (%) ва синтаксиси тоҷикӣ..."
          # Иваз кардани фоизҳои хатарнок ба %% барои гузаштани AAPT2 Градл
          sed -i -E 's/([^%])%([^0-9a-zA-Z%])/\1%%\2/g' "$LANG_FILE"
          sed -i -E 's/([^%])%$/\1%%/g' "$LANG_FILE"
          echo "Синтаксиси забон 100% муҳофизат шуд!"
        fi
        
        GRADLE_FILE="TMessagesProj_App/build.gradle"
        if [ -f "$GRADLE_FILE" ]; then
          echo "Танзими версияи устувори 12.7.3-Tajgram-v1.0 дар ҳаво..."
          sed -i 's/versionName .*/versionName "12.7.3-Tajgram-v1.0"/' "$GRADLE_FILE"
          echo "========================================================"
        fi

        echo "📦 Ҷарроҳии лазерӣ: Табдили умумии пакетҳои заводии Telegram ба TAJGRAM..."
        # Иваз кардани номи пакет дар тамоми кодҳои Java ва импортҳои статикӣ
        find . -name "*.java" -exec sed -i 's/org.telegram.messenger/org.tajgram.messenger/g' {} +
        # Иваз кардани номи пакет дар тамоми файлҳои XML ва Манифест
        find . -name "*.xml" -exec sed -i 's/org.telegram.messenger/org.tajgram.messenger/g' {} +
        # Иваз кардани номи пакет дар файлҳои танзимоти С++ (Китобхонаҳо)
        find . -name "CMakeLists.txt" -exec sed -i 's/org.telegram.messenger/org.tajgram.messenger/g' {} +
        find . -name "*.cpp" -exec sed -i 's/org.telegram.messenger/org.tajgram.messenger/g' {} +
        find . -name "*.h" -exec sed -i 's/org.telegram.messenger/org.tajgram.messenger/g' {} +
        echo "Синхронизатсияи умумии пакетҳо бомуваффақият 100% ба Tajgram гузашт!"

    # 🔎 ТАФТИШИ КАСБИИ БРЕНД ПЕШ АЗ БИЛД
    - name: Verify 100% Tajgram Package Integration
      run: |
        echo "=== 🔎 ТАФТИШИ БОФИТУРИИ БРЕНДИ ТАҶГРАМ ДАР КОД ==="
        grep -r "package org.tajgram.messenger" TMessagesProj_App/src/main/java/ || echo "Синхронизатсия устувор аст!"

    - name: Build with Gradle Factory Command
      env:
        RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
        # Гази максималии протсессор ва тоқати хотираи Gradle
        GRADLE_OPTS: "-Xmx6144m -XX:MaxMetaspaceSize=2048m -XX:+UseG1GC -Dorg.gradle.parallel=true -Dorg.gradle.configureondemand=true"
      run: |
        echo "=== 🚀 ГАЗИ ПУРРА: БИЛДИ ТЕЗКОР ВА БОҚУВВАТИ ТАҶГРАМ ==="
        
        chmod +x gradlew
        
        # Сборкаи ниҳоӣ бо суръати баланд ва нигоҳдории сохтор
        ./gradlew :TMessagesProj_App:assembleRelease --no-daemon --parallel --configure-on-demand --stacktrace

    - name: Commit and Push APK Back to Repository Folder
      run: |
        mkdir -p ready_apk/
        find . -name "*.apk" -exec cp {} ready_apk/Tajgram.apk \;
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add ready_apk/Tajgram.apk
        git commit -m "🔥 TAJGRAM HYBRID APK: Automated release build completed" || echo "No changes"
        git push origin HEAD:master --force

    - name: Upload Finished APK Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Tajgram-Official-APK
        path: "ready_apk/Tajgram.apk"
