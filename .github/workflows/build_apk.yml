name: Build Tajgram APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4
      with:
        clean: true

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    # Ислоҳи автоматӣ: сохтани файли калид барои пешгирӣ аз хатои парол
    - name: Generate Release Keystore Automatically
      run: |
        mkdir -p TMessagesProj/config/
        rm -f TMessagesProj/config/release.keystore || true
        keytool -genkey -v -keystore TMessagesProj/config/release.keystore \
          -alias "${{ secrets.RELEASE_KEY_ALIAS }}" \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass "${{ secrets.RELEASE_STORE_PASSWORD }}" \
          -keypass "${{ secrets.RELEASE_KEY_PASSWORD }}" \
          -dname "CN=Tajgram, OU=VIP, O=Messenger, L=Dushanbe, S=Tajikistan, C=TJ"

    - name: Build with Gradle Factory Command
      env:
        RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
      run: |
        chmod +x gradlew
        ./gradlew :TMessagesProj_App:assembleRelease --stacktrace

    - name: Upload Finished APK Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Tajgram-Official-APK
        path: TMessagesProj_App/build/outputs/apk/release/*.apk
