Name: Build Tajgram APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JAVA_TOOL_OPTIONS: "-Xmx6g -XX:+UseG1GC"
      # Инҷо рақами версияро иваз мекунӣ ва тамом:
      MY_APP_VERSION: "1.0.0"

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4
      with:
        clean: true
        ref: master
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Inject Secrets into Gradle Properties
      run: |
        echo "RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}" >> gradle.properties
        echo "RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}" >> gradle.properties
        echo "RELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }}" >> gradle.properties

    - name: Check SHA Fingerprints
      run: |
        if [ -f "TMessagesProj/config/release.keystore" ]; then
          keytool -list -v -keystore TMessagesProj/config/release.keystore \
            -storepass "${{ secrets.RELEASE_STORE_PASSWORD }}" | grep -E "SHA1:|SHA256:" || echo "Keystore check complete"
        else
          echo "Огоҳӣ: Keystore дар TMessagesProj/config/ ёфт нашуд, аммо билд идома меёбад."
        fi

    # Ислоҳи муҳофизатӣ: Танҳо versionName-ро иваз мекунад, ба дигар қисми Gradle даст намезанад
    - name: Apply Version
      run: |
        GRADLE_FILE=$(find . -name "build.gradle" | grep "TMessagesProj" | head -n 1)
        if [ -f "$GRADLE_FILE" ]; then
          sed -i "s/versionName \".*\"/versionName \"$MY_APP_VERSION\"/" "$GRADLE_FILE"
          echo "🚀 Версияи насбшуда: $MY_APP_VERSION"
        fi
       
    - name: Build with Gradle
      env:
        RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
        GRADLE_OPTS: "-Xmx6144m -XX:MaxMetaspaceSize=2048m -XX:+UseG1GC -Dorg.gradle.parallel=true -Dorg.gradle.configureondemand=true"
      run: |
        chmod +x gradlew
        ./gradlew clean assembleRelease --no-daemon --parallel --configure-on-demand --stacktrace

    - name: Commit and Push APK
      run: |
        mkdir -p ready_apk/
        find . -name "*.apk" -exec cp {} ready_apk/Tajgram.apk \;
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add ready_apk/Tajgram.apk
        git commit -m "🔥 TAJGRAM HYBRID APK: Version $MY_APP_VERSION released" || echo "No changes"
        git push origin HEAD:master --force

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Tajgram-Official-APK
        path: ready_apk/Tajgram.apk
