name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Setup Android NDK Tools (ИСРOҲИ КAФOЛAТНOКИ CMake)
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          local-properties: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build with Gradle Factory Command
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace -x test -x lint -x check
          
      - name: Upload Finished APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Tajgram-VIP-Finished-APK
          path: "**/build/outputs/apk/**/*.apk"
