name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc

      - name: Checkout Repository with ALL Submodules (НАҶОТИ ФАЙЛҲОИ VOIP)
        uses: actions/checkout@v4
        with:
          # ИСЛОҲИ ТИЛЛОӢ: Скачат кардани кулли файлҳои зангҳо ва субмодулҳо
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build with Gradle Factory Command
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace -x test -x lint -x check
          
      - name: Upload Finished APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Tajgram-VIP-Finished-APK
          path: "**/build/outputs/apk/**/*.apk"
