name: Build and Package Tajgram VIP APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc

      - name: Checkout Your Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          local-properties: true

      - name: Force Setup Environments and Sync Keys
        run: |
          mkdir -p src/main/config TMessagesProj/src/main/config
          echo "package org.telegram.messenger; public class Config { public static int API_ID = 4; public static String API_HASH = \"014b35b6184100b085b0d0572f9b5103\"; }" > src/main/config/Config.java
          echo "package org.telegram.messenger; public class Config { public static int API_ID = 4; public static String API_HASH = \"014b35b6184100b085b0d0572f9b5103\"; }" > TMessagesProj/src/main/config/Config.java
          
          echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties
          echo "ndk.dir=${{ steps.setup-ndk.outputs.ndk-path }}" >> local.properties
          
          if [ -d "TMessagesProj" ]; then
            echo "sdk.dir=/usr/local/lib/android/sdk" > TMessagesProj/local.properties
            echo "ndk.dir=${{ steps.setup-ndk.outputs.ndk-path }}" >> TMessagesProj/local.properties
          fi
          
          if [ -d "buildSrc" ]; then
            echo "sdk.dir=/usr/local/lib/android/sdk" > buildSrc/local.properties
            echo "ndk.dir=${{ steps.setup-ndk.outputs.ndk-path }}" >> buildSrc/local.properties
          fi
          
          mkdir -p /home/runner/work/tajgram/tajgram
          echo "sdk.dir=/usr/local/lib/android/sdk" > /home/runner/work/tajgram/tajgram/local.properties
          echo "ndk.dir=${{ steps.setup-ndk.outputs.ndk-path }}" >> /home/runner/work/tajgram/tajgram/local.properties

      - name: Setup and Lock Lifetime SHA Passport Keys (УМУРБОД)
        run: |
          git config --global user.name "Saidjun Chief Developer"
          git config --global user.email "saidjun@tajgram.messenger"
          
          # Агар калиди ҳамешагӣ аз пеш сохта нашуда бошад, онро як бор месозад
          if [ ! -f "tajgram_lifetime.keystore" ]; then
            echo "Сохтани Паспорти умурбоди Tajgram..."
            keytool -genkey -v -keystore tajgram_lifetime.keystore -storepass tajgram2026 -alias tajgram_key -keypass tajgram2026 -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Tajgram VIP,O=Saidjun,C=TJ" || true
            git add tajgram_lifetime.keystore
            git commit -m "🔑 КАЛИД: Паспорти ҳамешагии барнома барои Firebase ҳифз шуд" || true
            git push origin HEAD:${{ github.ref_name }} || true
          fi
          
          # Намоиши калидҳои SHA-1 ва SHA-256 барои Firebase (Ҳамеша як хел мемонанд)
          echo "--- ПАСПОРТИ БАРНОМАИ ТУ (SHA-1 ва SHA-256) ДАР ЗЕР АСТ ---"
          keytool -list -v -keystore tajgram_lifetime.keystore -alias tajgram_key -storepass tajgram2026 | grep -E "SHA1:|SHA256:" || true
          echo "--------------------------------------------------------"
          
          # Гузоштани калид ба папкаи лозимӣ барои сохтмони APK
          mkdir -p ~/.android
          cp tajgram_lifetime.keystore ~/.android/debug.keystore

      - name: Build Android APK
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx6g -Dorg.gradle.parallel=true"
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace -x test -x lint -x check

      - name: Upload Finished APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Tajgram-VIP-Debug-APK
          path: "TMessagesProj/build/outputs/apk/**/*.apk"
