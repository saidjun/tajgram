workflows:
  android-workflow:
    name: Tajgram VIP Factory Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      vars:
        JAVA_VERSION: "17"
    scripts:
      - name: Set up Java Development Kit
        script: |
          jdk switch 17
          echo "✅ Java 17 фаъол шуд!"

      - name: Recreate Factory Keystore Inside Config
        script: |
          mkdir -p TMessagesProj/config/
          rm -f TMessagesProj/config/release.keystore || true
          
          # Сохтани автоматии калид барои сохтан
          keytool -genkey -v -keystore TMessagesProj/config/release.keystore \
            -alias AndroidDebugKey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android -dname "CN=Tajgram, OU=VIP, O=Messenger, L=Dushanbe, S=Tajikistan, C=TJ"
          
          cat <<EOF > TMessagesProj/config/keystore.properties
          keyAlias=AndroidDebugKey
          keyPassword=android
          storePassword=android
          EOF
          echo "✅ Калиди ҳақиқӣ сохта шуд!"

      - name: Build Tajgram VIP Release APK Without Tests
        script: |
          chmod +x gradlew
          ./gradlew :TMessagesProj_App:assembleRelease -x test --generateLabels --no-daemon

    artifacts:
      - TMessagesProj_App/build/outputs/apk/release/*.apk
