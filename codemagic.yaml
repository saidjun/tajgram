workflows:
  android-workflow:
    name: Tajgram VIP Factory Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - release
    scripts:
      - name: Setup Java
        script: |
          export JAVA_HOME=$JAVA_HOME_17
          java -version

      - name: Check SHA Fingerprints
        script: |
          keytool -list -v -keystore TMessagesProj/config/release.keystore \
            -storepass "$RELEASE_STORE_PASSWORD" | grep -E "SHA1:|SHA256:" || echo "Keystore check complete"

      - name: Auto-Fix and Commit Tajik Language Syntax
        script: |
          echo "🤖 Робот оғоз шуд: Ислоҳи пурра ва тафтиши ҳамаҷониба..."
          
          find . -name "strings.xml" | grep "values-tg" | while read LANG_FILE; do
            echo "🔎 Санҷиши файл: $LANG_FILE"
            
            # 1. Ислоҳи аломатҳои XML (тамоми символҳоро ба коди амн табдил медиҳад)
            sed -i '' 's/&/&amp;/g' "$LANG_FILE"
            sed -i '' 's/</&lt;/g' "$LANG_FILE"
            sed -i '' 's/>/&gt;/g' "$LANG_FILE"
            sed -i '' 's/"/&quot;/g' "$LANG_FILE"
            sed -i '' "s/'/&apos;/g" "$LANG_FILE"
            
            # 2. Ислоҳи фоизҳо (бо нигоҳ доштани %1$s, %2$d ва ғайра)
            # Аввал ҳамаи %-ҳоро ба %% мебарем
            sed -i '' 's/%/%%/g' "$LANG_FILE"
            # Баъд %1$s, %2$d ва ғайраро барқарор мекунем
            sed -i '' -E 's/%%([0-9]\$[ds])/%\1/g' "$LANG_FILE"
            # Баъд %%-ҳои воқеиро (ки ду фоиз буданд) барқарор мекунем (агар лозим бошад)
          done
          
          # 3. Ислоҳи версия
          GRADLE_FILE=$(find . -name "build.gradle" | grep "TMessagesProj" | head -n 1)
          [ -f "$GRADLE_FILE" ] && sed -i '' 's/versionName .*/versionName "1.0"/' "$GRADLE_FILE"
          
          # 4. Push ба GitHub
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n $(git status -s) ]]; then
            git add .
            git commit -m "🤖 Robot: Fully sanitized strings.xml syntax"
            git push origin HEAD:master
            echo "✅ Ислоҳот Push шуд."
          else
            echo "✨ Ҳамаи файлҳо аллакай дурустанд."
          fi
       
      - name: Build with Gradle Factory Command
        script: |
          echo "=== 🚀 ГАЗИ ПУРРА: БИЛДИ ТЕЗКОР ВА БОҚУВВАТИ ТАҶГРАМ ==="
          chmod +x gradlew
          ./gradlew clean assembleRelease -x test --no-daemon --parallel --configure-on-demand --stacktrace \
            -Pandroid.injected.signing.store.file=$(pwd)/TMessagesProj/config/release.keystore \
            -Pandroid.injected.signing.store.password=$RELEASE_STORE_PASSWORD \
            -Pandroid.injected.signing.key.password=$RELEASE_KEY_PASSWORD \
            -Pandroid.injected.signing.key.alias=$RELEASE_KEY_ALIAS

    artifacts:
      - TMessagesProj/build/outputs/**/*.apk
      - TMessagesProj_App/build/outputs/**/*.apk
