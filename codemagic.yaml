workflows:
  android-workflow:
    name: Tajgram VIP Factory Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      vars:
        JAVA_VERSION: "17"
    scripts:
      - name: Set up Java Development Kit
        script: |
          jdk switch 17
          echo "✅ Java 17 фаъол шуд!"
      - name: Build Tajgram VIP Release APK Without Tests
        script: |
          chmod +x gradlew
          # РОБОТ ТЕСТҲОИ ХAТOРО ХAТ МEЗАНAД ВA МУСТАҚИМ АПК-РО БE ХАТO МEПАЗAД!
          ./gradlew assembleRelease -x test -x generateScheme --no-daemon
    artifacts:
      - TMessagesProj/build/outputs/apk/release/*.apk
      - "**/build/outputs/apk/**/*.apk"
