workflows:
  android-workflow:
    name: Tajgram VIP Factory Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      vars:
        JAVA_VERSION: "17"
    scripts:
      - name: Set up Java Development Kit
        script: |
          # Танзими аслии Java 17 барои серверҳои нави Codemagic
          export JAVA_HOME=$JAVA_HOME_17
          export PATH=$JAVA_HOME/bin:$PATH
          java -version
          echo "✅ Java 17 бомуваффақият фаъол шуд!"

      - name: Recreate Factory Keystore Inside Config
        script: |
          mkdir -p TMessagesProj/config/
          rm -f TMessagesProj/config/release.keystore || true
          
          # Сабти устувор тавассути Эхо
          echo "keyAlias=$RELEASE_KEY_ALIAS" > TMessagesProj/config/keystore.properties
          echo "keyPassword=$RELEASE_KEY_PASSWORD" >> TMessagesProj/config/keystore.properties
          echo "storePassword=$RELEASE_STORE_PASSWORD" >> TMessagesProj/config/keystore.properties
          
          # ФАРМОНИ ТАЪРИХӢ: Ҳамаи тағйирёбандаҳо дар як сатри узун бе хатои синтаксис
          keytool -genkeypair -v -keystore TMessagesProj/config/release.keystore -alias $RELEASE_KEY_ALIAS -keyalg RSA -keysize 2048 -validity 10000 -storepass $RELEASE_STORE_PASSWORD -keypass $RELEASE_KEY_PASSWORD -dname "CN=Tajgram, OU=VIP, O=Messenger, L=Dushanbe, S=Tajikistan, C=TJ"
          
          # ЧОП КАРДАНИ SHA-1 ВА SHA-256 БО ЧАШМИ ХУД
          echo "=== САНҶИШИ ПАСПОРТИ РАҚАМИИ БАРНОМА ==="
          keytool -list -v -keystore TMessagesProj/config/release.keystore -storepass $RELEASE_STORE_PASSWORD | grep -E "SHA1:|SHA256:" || true
          echo "========================================="
          
          echo "✅ Калид бо номи tajgram_key бехато сохта шуд!"

      - name: Build Tajgram VIP Release APK Without Tests
        script: |
          chmod +x gradlew
          ./gradlew :TMessagesProj_App:assembleRelease -x test --no-daemon

    artifacts:
      - TMessagesProj_App/build/outputs/apk/release/*.apk
