workflows:
  android-workflow:
    name: Tajgram VIP Factory Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - release # Ин се калидро дар CodeMagic дар Environment variables илова кун
    scripts:
      - name: Check SHA Fingerprints
        script: |
          keytool -list -v -keystore TMessagesProj/config/release.keystore \
            -storepass "$RELEASE_STORE_PASSWORD" | grep -E "SHA1:|SHA256:" || echo "Keystore check complete"

      - name: Auto-Fix Tajik Language Syntax & Version
        script: |
          LANG_FILE="TMessagesProj/src/main/res/values-tg/strings.xml"
          [ ! -f "$LANG_FILE" ] && LANG_FILE="TMessagesProj_App/src/main/res/values-tg/strings.xml"
          if [ -f "$LANG_FILE" ]; then
            sed -i -E 's/([^%])%([^0-9a-zA-Z%])/\1%%\2/g' "$LANG_FILE"
            sed -i -E 's/([^%])%$/\1%%/g' "$LANG_FILE"
          fi
          
          GRADLE_FILE="TMessagesProj/build.gradle"
          [ ! -f "$GRADLE_FILE" ] && GRADLE_FILE="TMessagesProj_App/build.gradle"
          if [ -f "$GRADLE_FILE" ]; then
            sed -i 's/versionName .*/versionName "1.0"/ ' "$GRADLE_FILE"
          fi

      - name: Build Tajgram APK
        script: |
          chmod +x gradlew
          ./gradlew clean assembleRelease --no-daemon --parallel --configure-on-demand --stacktrace \
            -Pandroid.injected.signing.store.file=$(pwd)/TMessagesProj/config/release.keystore \
            -Pandroid.injected.signing.store.password=$RELEASE_STORE_PASSWORD \
            -Pandroid.injected.signing.key.password=$RELEASE_KEY_PASSWORD \
            -Pandroid.injected.signing.key.alias=$RELEASE_KEY_ALIAS

    artifacts:
      - TMessagesProj/build/outputs/**/*.apk
      - TMessagesProj_App/build/outputs/**/*.apk
