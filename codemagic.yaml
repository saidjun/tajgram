workflows:
  android-workflow:
    name: Android Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Build APK
        script: |
          ./gradlew assembleRelease --no-daemon
    artifacts:
      - TMessagesProj/build/outputs/apk/**/*.apk
